<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PokeSim - Admin Panel</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #3b4cca;
            --primary-dark: #00238f;
            --border: #e2e8f0;
            --text-dark: #2d3748;
            --text-light: #5a6e8a;
            --success: #48bb78;
            --danger: #f56565;
        }
        body {
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        h1 {
            color: var(--primary-dark);
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 16px;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            margin: 10px 0 20px;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 1rem;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .ranking-table th, .ranking-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .ranking-table th {
            cursor: pointer;
            background: #f8fafc;
            font-weight: 600;
        }
        .ranking-table th:hover {
            background: #eef2ff;
        }
        .ranking-table tr:hover {
            background: #f8fafc;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background: #e53e3e;
        }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
        }
        .active-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            background: var(--success);
            color: white;
        }
        .inactive-badge {
            background: var(--danger);
        }
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.7rem;
            font-weight: bold;
            margin: 0 2px;
            color: white;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .move-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 2px 4px;
            color: white;
            text-shadow: 0 0 1px rgba(0,0,0,0.3);
        }
        .mon-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }
        .mon-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-right: 20px;
        }
        .mon-info {
            flex: 1;
        }
        .mon-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 32px;
            max-width: 900px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            max-height: 85vh;
            overflow-y: auto;
        }
        .hidden {
            display: none !important;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .form-group {
            margin: 15px 0;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 0.9rem;
        }
        .move-list {
            max-height: 400px;
            overflow-y: auto;
            margin: 16px 0;
            text-align: left;
        }
        .move-button {
            display: inline-block;
            margin: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            background: var(--text-light);
            color: white;
        }
        .move-button.selected {
            outline: 2px solid gold;
            filter: brightness(1.1);
        }
        .species-info {
            margin-top: 5px;
            font-size: 0.85rem;
            color: var(--primary);
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .ranking-table th, .ranking-table td {
                padding: 8px;
                font-size: 0.8rem;
            }
            .mon-item img {
                width: 40px;
                height: 40px;
                margin-right: 12px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="index.html">← Back to Game</a>
            <a href="pokemon_moves.html" class="nav-link" target="_blank" rel="noopener noreferrer">📖 Pokémon Move Database</a>
            <button id="logout-btn" class="btn btn-outline">Logout</button>
        </div>
        <h1>👑 Admin Panel</h1>
        <input type="text" id="user-search" class="search-input" placeholder="Search by trainer name...">
        <div style="overflow-x: auto;">
            <table class="ranking-table" id="user-table">
                <thead>
                    <tr>
                        <th data-sort="name">Trainer</th>
                        <th data-sort="totalLevels">Total Level ⬇️</th>
                        <th data-sort="totalEncounters">Total Encounters</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-body">
                    <tr><td colspan="5">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Manage User Modal -->
    <div id="manage-user-modal" class="overlay hidden" onclick="if(event.target===this) this.classList.add('hidden')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="flex-between" style="margin-bottom: 20px;">
                <h2 id="manage-user-title">Manage Trainer</h2>
                <button onclick="document.getElementById('manage-user-modal').classList.add('hidden')" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="flex-between" style="margin-bottom: 20px;">
                <div><strong>Coins:</strong> <span id="manage-coins">0</span></div>
                <div><button id="edit-coins-btn" class="btn btn-outline">Edit Coins</button></div>
                <div><strong>Total Level:</strong> <span id="manage-total-level">0</span></div>
                <div><button id="edit-total-level-btn" class="btn btn-outline">Edit Total Level</button></div>
            </div>
            <div style="margin-top: 20px;">
                <div class="flex-between">
                    <h3>Team</h3>
                    <button id="add-pokemon-btn" class="btn btn-primary">+ Add Pokémon</button>
                </div>
                <div id="team-list"></div>
                <h3 style="margin-top: 20px;">Collection</h3>
                <div id="collection-list"></div>
            </div>
        </div>
    </div>

    <!-- Edit Pokémon Modal -->
    <div id="edit-pokemon-modal" class="overlay hidden" onclick="if(event.target===this) this.classList.add('hidden')">
        <div class="modal" style="max-width: 700px;" onclick="event.stopPropagation()">
            <div class="flex-between" style="margin-bottom: 20px;">
                <h2>Edit Pokémon</h2>
                <button onclick="document.getElementById('edit-pokemon-modal').classList.add('hidden')" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="edit-pokemon-form"></div>
        </div>
    </div>

    <!-- Add Pokémon Modal -->
    <div id="add-pokemon-modal" class="overlay hidden" onclick="if(event.target===this) this.classList.add('hidden')">
        <div class="modal" style="max-width: 600px;" onclick="event.stopPropagation()">
            <div class="flex-between" style="margin-bottom: 20px;">
                <h2>Add Pokémon</h2>
                <button onclick="document.getElementById('add-pokemon-modal').classList.add('hidden')" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="add-pokemon-form"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, updateDoc, deleteDoc, addDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDkCE0wBrsQ1s-7zplvTtWOSE28ISaCFfQ", authDomain: "pokesim-7f9b7.firebaseapp.com", projectId: "pokesim-7f9b7", storageBucket: "pokesim-7f9b7.firebasestorage.app", messagingSenderId: "1087100425430", appId: "1:1087100425430:web:9558a79ee5330d4a792577" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ========== MOVE DATABASE ==========
        let moveDatabase = [];
        let isMoveDatabaseLoaded = false;

        async function loadMoveDatabase() {
            if (isMoveDatabaseLoaded) return;
            console.log("Loading move database for admin...");
            try {
                const listRes = await fetch('https://pokeapi.co/api/v2/move?limit=2000&offset=0');
                const listData = await listRes.json();
                const allMoves = listData.results;
                const moveDetails = [];
                for (let i = 0; i < allMoves.length; i++) {
                    const move = allMoves[i];
                    try {
                        const detail = await fetch(move.url).then(r => r.json());
                        if (detail.power && detail.accuracy && detail.power > 0 && detail.accuracy > 0) {
                            moveDetails.push({
                                name: detail.name,
                                type: detail.type.name,
                                power: detail.power,
                                accuracy: detail.accuracy,
                                learners: detail.learned_by_pokemon.map(p => {
                                    const parts = p.url.split('/').filter(part => part);
                                    return parseInt(parts[parts.length - 1], 10);
                                })
                            });
                        }
                    } catch(e) { console.warn("Failed move", move.name); }
                }
                moveDatabase = moveDetails;
                isMoveDatabaseLoaded = true;
                console.log(`Loaded ${moveDatabase.length} damaging moves.`);
            } catch(err) {
                console.error("Failed to load move database:", err);
            }
        }
        loadMoveDatabase();

        // ========== ALL POKÉMON SPECIES ==========
        let allPokemon = []; // { id, name, types, sprite }

        async function loadAllPokemon() {
            if (allPokemon.length) return;
            console.log("Loading all Pokémon species...");
            try {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000&offset=0');
                const data = await res.json();
                const promises = data.results.map(async (p, idx) => {
                    const id = idx + 1; // assumes order
                    const detail = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r => r.json());
                    return {
                        id: id,
                        name: detail.name,
                        types: detail.types.map(t => t.type.name),
                        sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`
                    };
                });
                allPokemon = await Promise.all(promises);
                console.log(`Loaded ${allPokemon.length} Pokémon.`);
            } catch(e) {
                console.error("Failed to load Pokémon species:", e);
            }
        }

        // Helper functions
        function getTypeColor(type) {
            const colors = {
                normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
                grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
                ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
                rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', dark: '#705746',
                steel: '#B7B7CE', fairy: '#D685AD'
            };
            return colors[type] || '#777777';
        }

        function generateTypeBadges(types) {
            return types.map(t => `<span class="type-badge" style="background: ${getTypeColor(t)};">${t.toUpperCase()}</span>`).join('');
        }

        function getStaticSpriteUrl(id) {
            return [`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`];
        }

        function loadImageWithFallback(img, urls) {
            let i=0;
            function next() {
                if(i>=urls.length) return;
                img.src=urls[i];
                img.onerror=()=>{ i++; next(); };
            }
            next();
        }

        function getExpNeededForNextLevel(l) { return l*300; }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== USER MANAGEMENT ==========
        let allUsers = [];
        let currentEditingUser = null;

        async function fetchAllUsers() {
            const usersSnap = await getDocs(collection(db, "users"));
            const users = [];
            for (const docSnap of usersSnap.docs) {
                const data = docSnap.data();
                if (!data.hasStarter) continue; // skip incomplete
                const trainerName = data.trainerName || docSnap.id.split('@')[0];
                users.push({
                    uid: docSnap.id,
                    name: trainerName,
                    totalLevels: data.totalLevels || 0,
                    totalEncounters: data.totalEncounters || 0,
                    active: data.active !== false, // default true
                    coins: data.coins || 0,
                    role: data.role || null
                });
            }
            return users;
        }

        function renderUserTable(users, filterTerm = '') {
            const tbody = document.getElementById('user-body');
            const filtered = users.filter(u => u.name.toLowerCase().includes(filterTerm));
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No users found.</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(u => `
                <tr data-uid="${u.uid}">
                    <td>${escapeHtml(u.name)}</td>
                    <td>${u.totalLevels}</td>
                    <td>${u.totalEncounters}</td>
                    <td><span class="active-badge ${!u.active ? 'inactive-badge' : ''}">${u.active ? 'Active' : 'Inactive'}</span></td>
                    <td>
                        <button class="btn btn-primary toggle-active" data-uid="${u.uid}" data-active="${u.active}">${u.active ? 'Deactivate' : 'Activate'}</button>
                        <button class="btn btn-outline manage-user" data-uid="${u.uid}">Manage</button>
                    </td>
                </tr>
            `).join('');

            // Attach event listeners
            document.querySelectorAll('.toggle-active').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const uid = btn.dataset.uid;
                    const newActive = btn.dataset.active === 'true' ? false : true;
                    await updateDoc(doc(db, "users", uid), { active: newActive });
                    allUsers = await fetchAllUsers();
                    renderUserTable(allUsers, document.getElementById('user-search').value.toLowerCase());
                };
            });
            document.querySelectorAll('.manage-user').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const uid = btn.dataset.uid;
                    try {
                        await openManageUserModal(uid);
                    } catch (err) {
                        console.error("Error opening manage modal:", err);
                        alert("Could not open user management. Check console.");
                    }
                };
            });
        }

        async function openManageUserModal(uid) {
            currentEditingUser = uid;
            const userDoc = await getDoc(doc(db, "users", uid));
            if (!userDoc.exists()) {
                alert("User not found.");
                return;
            }
            const userData = userDoc.data();
            const trainerName = userData.trainerName || uid.split('@')[0];
            document.getElementById('manage-user-title').innerText = `Manage ${escapeHtml(trainerName)}`;
            document.getElementById('manage-coins').innerText = userData.coins || 0;
            document.getElementById('manage-total-level').innerText = userData.totalLevels || 0;
            document.getElementById('edit-coins-btn').onclick = () => editCoins(uid);
            document.getElementById('edit-total-level-btn').onclick = () => editTotalLevel(uid);
            
            // Load Pokémon
            const pokemonSnap = await getDocs(collection(db, "users", uid, "pokemon"));
            const team = [];
            const collectionList = [];
            pokemonSnap.forEach(doc => {
                const p = { id: doc.id, ...doc.data() };
                // Ensure moves array exists (fallback)
                if (!p.moves || !Array.isArray(p.moves)) {
                    p.moves = [{ name: 'tackle', type: 'normal', power: 40, accuracy: 100, effect: '-', effectAccuracy: '-', icon: '🔘' }];
                }
                if (p.inTeam) team.push(p);
                else collectionList.push(p);
            });
            renderPokemonList('team-list', team, true, uid);
            renderPokemonList('collection-list', collectionList, false, uid);
            document.getElementById('manage-user-modal').classList.remove('hidden');
            document.getElementById('add-pokemon-btn').onclick = () => openAddPokemonModal(uid);
        }

        function renderPokemonList(containerId, pokemonList, isTeam, uid) {
            const container = document.getElementById(containerId);
            if (pokemonList.length === 0) {
                container.innerHTML = '<p>No Pokémon here.</p>';
                return;
            }
            container.innerHTML = '';
            for (const p of pokemonList) {
                const div = document.createElement('div');
                div.className = 'mon-item';
                const img = document.createElement('img');
                loadImageWithFallback(img, getStaticSpriteUrl(p.pokemonId));
                div.appendChild(img);
                const info = document.createElement('div');
                info.className = 'mon-info';
                const expNeeded = getExpNeededForNextLevel(p.level);
                const expCur = p.exp || 0;
                const prog = Math.floor((expCur/expNeeded)*100);
                const moveBadges = p.moves.map(m => `<span class="move-badge" style="background: ${getTypeColor(m.type)};">${m.name.toUpperCase()}</span>`).join('');
                info.innerHTML = `
                    <b>${escapeHtml(p.name.toUpperCase())}</b> (Lvl ${p.level} | XP: ${expCur}/${expNeeded} [${prog}%])<br>
                    <small>${p.types.join(', ')}</small><br>
                    <div style="margin-top: 6px;">${moveBadges}</div>
                `;
                div.appendChild(info);
                const btnDiv = document.createElement('div');
                btnDiv.className = 'mon-buttons';
                const editBtn = document.createElement('button');
                editBtn.className = 'btn btn-outline';
                editBtn.innerText = 'Edit';
                editBtn.onclick = () => openEditPokemonModal(p.id, uid);
                btnDiv.appendChild(editBtn);
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn btn-danger';
                deleteBtn.innerText = 'Delete';
                deleteBtn.onclick = () => deletePokemon(p.id, uid, p.name);
                btnDiv.appendChild(deleteBtn);
                if (isTeam) {
                    const moveToColl = document.createElement('button');
                    moveToColl.className = 'btn btn-outline';
                    moveToColl.innerText = 'Move to Collection';
                    moveToColl.onclick = () => movePokemonTeamStatus(p.id, uid, false);
                    btnDiv.appendChild(moveToColl);
                } else {
                    const moveToTeam = document.createElement('button');
                    moveToTeam.className = 'btn btn-outline';
                    moveToTeam.innerText = 'Add to Team';
                    moveToTeam.onclick = () => movePokemonTeamStatus(p.id, uid, true);
                    btnDiv.appendChild(moveToTeam);
                }
                div.appendChild(btnDiv);
                container.appendChild(div);
            }
        }

        async function movePokemonTeamStatus(pokemonId, uid, inTeam) {
            await updateDoc(doc(db, "users", uid, "pokemon", pokemonId), { inTeam });
            await openManageUserModal(uid);
        }

        async function deletePokemon(pokemonId, uid, name) {
            if (confirm(`Delete ${name}? This cannot be undone.`)) {
                await deleteDoc(doc(db, "users", uid, "pokemon", pokemonId));
                await openManageUserModal(uid);
            }
        }

        async function editCoins(uid) {
            const newCoins = prompt("Enter new coin amount:", document.getElementById('manage-coins').innerText);
            if (newCoins !== null && !isNaN(parseInt(newCoins))) {
                await updateDoc(doc(db, "users", uid), { coins: parseInt(newCoins) });
                document.getElementById('manage-coins').innerText = newCoins;
                // Refresh user list to reflect changes
                allUsers = await fetchAllUsers();
                renderUserTable(allUsers, document.getElementById('user-search').value.toLowerCase());
            }
        }

        async function editTotalLevel(uid) {
            const newTotalLevel = prompt("Enter new total level:", document.getElementById('manage-total-level').innerText);
            if (newTotalLevel !== null && !isNaN(parseInt(newTotalLevel))) {
                await updateDoc(doc(db, "users", uid), { totalLevels: parseInt(newTotalLevel) });
                document.getElementById('manage-total-level').innerText = newTotalLevel;
                // Refresh user list to reflect changes
                allUsers = await fetchAllUsers();
                renderUserTable(allUsers, document.getElementById('user-search').value.toLowerCase());
            }
        }

        // ========== POKEMON SELECTION (WITH FALLBACK) ==========
        async function getPokemonById(id) {
            // First try from preloaded list
            let pokemon = allPokemon.find(p => p.id === id);
            if (pokemon) return pokemon;
            // Fallback: fetch directly from PokeAPI
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                if (!res.ok) return null;
                const data = await res.json();
                return {
                    id: id,
                    name: data.name,
                    types: data.types.map(t => t.type.name),
                    sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`
                };
            } catch (err) {
                console.warn(`Failed to fetch Pokémon ${id}:`, err);
                return null;
            }
        }

        async function createSpeciesInput(currentId, onChange) {
            const container = document.createElement('div');
            container.className = 'form-group';
            container.innerHTML = `
                <label>Pokémon ID</label>
                <input type="number" id="species-id-input" class="species-id-input" value="${currentId}" min="1" max="1025" step="1">
                <div id="species-info" class="species-info">Loading...</div>
            `;
            const input = container.querySelector('#species-id-input');
            const infoDiv = container.querySelector('#species-info');
            
            async function updateInfo() {
                const id = parseInt(input.value, 10);
                if (isNaN(id) || id < 1) {
                    infoDiv.innerHTML = '<span style="color: var(--danger);">Enter a valid ID (1-1025)</span>';
                    if (onChange) onChange(null, null);
                    return;
                }
                infoDiv.innerHTML = '<span>Loading...</span>';
                const species = await getPokemonById(id);
                if (species) {
                    infoDiv.innerHTML = `<strong>${species.name.toUpperCase()}</strong> (${species.types.join(', ')})`;
                    if (onChange) onChange(id, species);
                } else {
                    infoDiv.innerHTML = '<span style="color: var(--danger);">Invalid Pokémon ID</span>';
                    if (onChange) onChange(null, null);
                }
            }
            
            input.addEventListener('input', updateInfo);
            await updateInfo(); // initial
            return container;
        }

        async function openEditPokemonModal(pokemonId, uid) {
            // Ensure moves database loaded
            if (!isMoveDatabaseLoaded) {
                await loadMoveDatabase();
            }
            const pokemonRef = doc(db, "users", uid, "pokemon", pokemonId);
            const pokemonSnap = await getDoc(pokemonRef);
            const p = pokemonSnap.data();
            const formContainer = document.getElementById('edit-pokemon-form');
            formContainer.innerHTML = `
                <div id="edit-species-container"></div>
                <div class="form-group">
                    <label>Level</label>
                    <input type="number" id="edit-level" value="${p.level}" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>XP</label>
                    <input type="number" id="edit-exp" value="${p.exp || 0}" min="0">
                </div>
                <div class="form-group">
                    <label>Moves (click to toggle, up to 4)</label>
                    <div id="edit-moves-list" style="max-height: 300px; overflow-y: auto;"></div>
                </div>
                <button id="save-pokemon-edit" class="btn btn-primary">Save Changes</button>
            `;
            let selectedSpeciesId = p.pokemonId;
            let selectedSpecies = await getPokemonById(selectedSpeciesId);
            const speciesContainer = document.getElementById('edit-species-container');
            const speciesInput = await createSpeciesInput(selectedSpeciesId, (id, species) => {
                selectedSpeciesId = id;
                selectedSpecies = species;
            });
            speciesContainer.appendChild(speciesInput);
            
            await populateMoveSelector('edit-moves-list', p.moves);
            
            document.getElementById('save-pokemon-edit').onclick = async () => {
                const newSpeciesId = selectedSpeciesId;
                const newLevel = parseInt(document.getElementById('edit-level').value);
                const newExp = parseInt(document.getElementById('edit-exp').value);
                const selectedMoves = getSelectedMovesFromUI();
                if (!selectedSpecies) {
                    alert("Invalid Pokémon ID. Please fix before saving.");
                    return;
                }
                await updateDoc(pokemonRef, {
                    pokemonId: newSpeciesId,
                    name: selectedSpecies.name,
                    level: newLevel,
                    exp: newExp,
                    types: selectedSpecies.types,
                    moves: selectedMoves
                });
                document.getElementById('edit-pokemon-modal').classList.add('hidden');
                await openManageUserModal(uid);
            };
            document.getElementById('edit-pokemon-modal').classList.remove('hidden');
        }

        async function populateMoveSelector(containerId, currentMoves) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const moves = moveDatabase.map(m => ({
                name: m.name,
                type: m.type,
                power: m.power,
                accuracy: m.accuracy
            }));
            const uniqueMoves = [];
            const seen = new Set();
            for (const m of moves) {
                if (!seen.has(m.name)) {
                    seen.add(m.name);
                    uniqueMoves.push(m);
                }
            }
            uniqueMoves.sort((a,b) => a.name.localeCompare(b.name));
            container.innerHTML = '';
            uniqueMoves.forEach(move => {
                const btn = document.createElement('button');
                btn.className = 'move-button';
                btn.textContent = `${move.name.toUpperCase()} (${move.power})`;
                btn.style.backgroundColor = getTypeColor(move.type);
                btn.style.color = 'white';
                btn.dataset.name = move.name;
                btn.onclick = () => {
                    btn.classList.toggle('selected');
                };
                if (currentMoves.some(m => m.name === move.name)) {
                    btn.classList.add('selected');
                }
                container.appendChild(btn);
            });
        }

        function getSelectedMovesFromUI() {
            const selected = [];
            document.querySelectorAll('#edit-moves-list .move-button.selected').forEach(btn => {
                const name = btn.dataset.name;
                const move = moveDatabase.find(m => m.name === name);
                if (move) {
                    selected.push({
                        name: move.name,
                        type: move.type,
                        power: move.power,
                        accuracy: move.accuracy,
                        effect: '-',
                        effectAccuracy: '-',
                        icon: '✨'
                    });
                }
            });
            while (selected.length < 4) {
                selected.push({
                    name: 'tackle',
                    type: 'normal',
                    power: 40,
                    accuracy: 100,
                    effect: '-',
                    effectAccuracy: '-',
                    icon: '🔘'
                });
            }
            return selected.slice(0,4);
        }

        async function openAddPokemonModal(uid) {
            const formContainer = document.getElementById('add-pokemon-form');
            formContainer.innerHTML = `
                <div id="add-species-container"></div>
                <div class="form-group">
                    <label>Level</label>
                    <input type="number" id="add-level" value="10" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>XP</label>
                    <input type="number" id="add-exp" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Add to Team?</label>
                    <input type="checkbox" id="add-to-team">
                </div>
                <button id="confirm-add-pokemon" class="btn btn-primary">Add Pokémon</button>
            `;
            let selectedSpeciesId = 1;
            let selectedSpecies = await getPokemonById(1);
            const speciesContainer = document.getElementById('add-species-container');
            const speciesInput = await createSpeciesInput(1, (id, species) => {
                selectedSpeciesId = id;
                selectedSpecies = species;
            });
            speciesContainer.appendChild(speciesInput);
            
            document.getElementById('confirm-add-pokemon').onclick = async () => {
                const speciesId = selectedSpeciesId;
                const level = parseInt(document.getElementById('add-level').value);
                const exp = parseInt(document.getElementById('add-exp').value);
                const inTeam = document.getElementById('add-to-team').checked;
                if (!selectedSpecies) {
                    alert("Invalid Pokémon ID. Please fix before adding.");
                    return;
                }
                // Fetch default moves from API
                const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${speciesId}`);
                const pokeData = await pokeRes.json();
                const defaultMoves = await getMoveDetails(pokeData.moves.slice(0,4));
                const newPokemon = {
                    pokemonId: speciesId,
                    name: selectedSpecies.name,
                    level: level,
                    exp: exp,
                    moves: defaultMoves,
                    types: selectedSpecies.types,
                    inTeam: inTeam
                };
                await addDoc(collection(db, "users", uid, "pokemon"), newPokemon);
                document.getElementById('add-pokemon-modal').classList.add('hidden');
                await openManageUserModal(uid);
            };
            document.getElementById('add-pokemon-modal').classList.remove('hidden');
        }

        async function getMoveDetails(moves) {
            const results = [];
            for (const m of moves) {
                const url = m.move ? m.move.url : m.url;
                const detail = await fetch(url).then(r => r.json());
                results.push({
                    name: detail.name,
                    power: detail.power || 40,
                    type: detail.type.name,
                    accuracy: detail.accuracy || 100,
                    effect: '-',
                    effectAccuracy: '-',
                    icon: '✨'
                });
            }
            return results;
        }

        // ========== AUTH & INIT ==========
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const userData = userDoc.data();
            if (userData?.role !== 'admin') {
                alert("Access denied. You are not an admin.");
                window.location.href = 'index.html';
                return;
            }
            // Load all users and Pokémon species in parallel
            await Promise.all([fetchAllUsers(), loadAllPokemon()]);
            allUsers = await fetchAllUsers();
            renderUserTable(allUsers, '');
            document.getElementById('user-search').addEventListener('input', (e) => {
                renderUserTable(allUsers, e.target.value.toLowerCase());
            });
            // Sorting
            const headers = document.querySelectorAll('#user-table th');
            headers.forEach(th => {
                th.onclick = () => {
                    const sortBy = th.dataset.sort;
                    if (!sortBy) return;
                    const order = th.classList.contains('desc') ? 'asc' : 'desc';
                    allUsers.sort((a,b) => {
                        let aVal = a[sortBy], bVal = b[sortBy];
                        if (sortBy === 'name') {
                            aVal = a.name.toLowerCase();
                            bVal = b.name.toLowerCase();
                        }
                        if (order === 'desc') return bVal - aVal;
                        else return aVal - bVal;
                    });
                    renderUserTable(allUsers, document.getElementById('user-search').value.toLowerCase());
                    th.classList.toggle('desc', order === 'desc');
                };
            });
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>
