<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PokeSim | Gym Battles</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <style>
        /* ========== COMPLETE STYLES (same as before, kept compact) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        :root {
            --bg: #f0f2f5; --card-bg: #ffffff; --primary: #3b4cca; --primary-dark: #00238f;
            --accent: #ffde00; --text-dark: #2d3748; --text-light: #5a6e8a; --border: #e2e8f0;
            --success: #48bb78; --danger: #f56565;
        }
        body { background: var(--bg); min-height: 100vh; color: var(--text-dark); padding: 20px; }
        .hidden { display: none !important; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 40px; cursor: pointer;
            font-weight: 600; transition: 0.2s;
        }
        .move-btn .move-power {
    font-size: 0.85rem;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
    padding: 4px 8px;
    border-radius: 20px;
    margin-left: 8px;
}
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-light); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
        .container { max-width: 1200px; margin: 20px auto; background: var(--card-bg); border-radius: 32px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }
        .gym-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .gym-card {
            background: white; border-radius: 24px; border: 1px solid var(--border);
            padding: 20px; transition: 0.2s; cursor: pointer;
            display: flex; flex-direction: column;
        }
        .gym-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .gym-header { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .gym-img { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; background: #f0f0f0; }
        .gym-info { flex: 1; }
        .gym-name { font-size: 1.3rem; font-weight: bold; color: var(--primary-dark); }
        .badge-img { width: 40px; height: 40px; object-fit: contain; margin-left: auto; }
        .required { font-size: 0.8rem; margin: 10px 0; }
        .locked { color: var(--danger); }
        .unlocked { color: var(--success); }
        .defeated-badge { background: gold; color: #333; padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; display: inline-block; margin-top: 8px; }
        .team-preview { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        .team-preview img { width: 40px; height: 40px; object-fit: contain; background: #f8fafc; border-radius: 12px; padding: 4px; }
        .trainer-card {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: 32px; padding: 20px; color: white;
            display: inline-flex; flex-wrap: wrap; gap: 20px; align-items: center;
            margin-bottom: 30px; width: auto; min-width: 300px;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .trainer-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        .trainer-avatar { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .trainer-avatar img { width: 70px; height: 70px; border-radius: 50%; object-fit: contain; }
        .trainer-stats { flex: 1; z-index: 1; }
        .trainer-name { font-size: 1.5rem; font-weight: bold; }
        .badge-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .badge-icon { width: 40px; height: 40px; object-fit: contain; background: rgba(255,255,255,0.2); border-radius: 50%; padding: 4px; }
        #battle-container {
            background: linear-gradient(145deg, #87CEEB 0%, #c0e0ff 40%, #78c850 100%);
            border-radius: 24px; box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.5); overflow: hidden;
            max-width: 700px; margin: 0 auto;
        }
        .battle-header { background: var(--primary-dark); color: white; text-align: center; padding: 12px; font-weight: bold; }
        .battle-ui { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .side { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .enemy-side { justify-content: flex-end; }
        .btl-sprite { width: 100px; height: 100px; object-fit: contain; cursor: pointer; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        .stat-box { background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); padding: 12px 16px; border-radius: 20px; width: 220px; border-left: 4px solid var(--primary); }
        .hp-bar { background: #e2e8f0; height: 8px; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .hp-fill { height: 100%; background: var(--success); width: 100%; transition: width 0.3s; }
        #battle-log { background: rgba(0,0,0,0.7); color: #e0e0e0; padding: 12px; font-family: monospace; height: 80px; overflow-y: auto; border-radius: 16px; margin: 10px 0; }
        #battle-moves { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .move-btn {
            display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
            border: none; border-radius: 32px; cursor: pointer; font-weight: 600; color: white;
            transition: 0.2s; background: #a0aec0;
        }
        .move-btn:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .catch-area { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        .type-badge, .move-badge {
            display: inline-block; padding: 2px 8px; border-radius: 16px; font-size: 0.7rem;
            font-weight: bold; margin: 0 2px; color: white; text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(4px); }
        .modal { background: var(--card-bg); padding: 30px; border-radius: 32px; max-width: 800px; width: 90%; text-align: center; max-height: 85vh; overflow-y: auto; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: var(--text-light); background: rgba(255,255,255,0.8); margin-top: 40px; border-top: 1px solid var(--border); }
        .pokemon-select-item {
            display: flex; align-items: center; gap: 15px; padding: 10px;
            background: #f8fafc; border-radius: 20px; margin-bottom: 10px;
            cursor: pointer; transition: 0.2s;
        }
        
        .pokemon-select-item:hover { background: #eef2ff; transform: translateX(4px); }
        .pokemon-select-item img { width: 60px; height: 60px; object-fit: contain; }
        .pokemon-select-info { flex: 1; text-align: left; }
        .move-list-small { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .hp-bar-small { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-top: 4px; }
        .hp-fill-small { height: 100%; background: var(--success); width: 100%; }
        .team-pokemon-card {
            background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px;
            display: flex; gap: 15px; align-items: center; transition: 0.2s;
        }
        .team-pokemon-card:hover { background: #eef2ff; }
        .team-pokemon-card img { width: 60px; height: 60px; object-fit: contain; background: white; border-radius: 12px; padding: 4px; }
        .team-pokemon-info { flex: 1; }
        .team-pokemon-actions { display: flex; gap: 8px; }
        .move-selector-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .move-selector-table th, .move-selector-table td { padding: 6px; text-align: left; border-bottom: 1px solid var(--border); }
        .move-selector-table th { background: #f1f5f9; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 16px; }
        .bonus-checkboxes { display: flex; gap: 20px; margin: 10px 0; }
        .bonus-checkboxes label { display: flex; align-items: center; gap: 5px; font-weight: normal; }
        .move-table-container {
            max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 16px;
            margin: 16px 0;
        }
        .move-table { width: 100%; border-collapse: collapse; }
        .move-table th, .move-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .move-table th { position: sticky; top: 0; background: #f8fafc; font-weight: 600; }
        .move-select { cursor: pointer; text-align: center; }
        .move-select input { width: 20px; height: 20px; cursor: pointer; }
        .move-search { margin-bottom: 12px; width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 40px; }
        .species-preview {
            display: flex; align-items: center; gap: 15px; margin-top: 10px; flex-wrap: wrap;
        }
        .species-preview img { width: 80px; height: 80px; object-fit: contain; background: #f8fafc; border-radius: 16px; padding: 8px; }
        .animated-btn {
            background: var(--primary); color: white; border: none; padding: 4px 12px;
            border-radius: 40px; cursor: pointer; font-size: 0.7rem; margin-left: auto;
        }
        .animated-btn:hover { background: var(--primary-dark); }
        @media (max-width: 768px) { .btl-sprite { width: 80px; height: 80px; } .stat-box { width: 180px; } .move-btn { padding: 8px 12px; } .trainer-card { flex-direction: column; text-align: center; width: 100%; } .badge-container { justify-content: center; } }
        /* Glowing bonus icons */
        .bonus-icon {
            display: inline-block;
            animation: pulse-glow 1.2s infinite ease-in-out;
            text-shadow: 0 0 5px currentColor;
            margin: 0 2px;
        }
        .bonus-icon.atk {
            color: #CE1126;
            text-shadow: 0 0 5px #CE1126, 0 0 10px #FF4444;
        }
        .bonus-icon.def {
            color: #0038A8;
            text-shadow: 0 0 5px #0038A8, 0 0 10px #3366FF;
        }
        .bonus-icon.spd {
            color: #FCD116;
            text-shadow: 0 0 5px #FCD116, 0 0 10px #FFE066;
        }
        @keyframes pulse-glow {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 12px currentColor; }
            100% { opacity: 0.7; transform: scale(1); }
        }
    
    </style>

<body>
    <div id="auth-screen" class="container" style="text-align: center;">
        <img src="PokeSim_Pokemon.png" alt="Logo" style="width: 200px; margin-bottom: 20px;">
        <p id="auth-message">Checking authentication...</p>
        <button id="redirect-login" class="btn btn-primary" style="display: none;">Go to Login</button>
    </div>

    <div id="app" class="hidden">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Game</a>
        <div class="flex-between">
            <h1> Gym Battles</h1>
            <button id="admin-panel-toggle" class="btn btn-outline hidden">Admin Panel</button>
        </div>

        <div id="trainer-card" class="trainer-card">
            <div class="trainer-avatar"><img id="trainer-avatar-img" src="" alt="Trainer"></div>
            <div class="trainer-stats">
                <div class="trainer-name" id="trainer-name-display">Loading...</div>
                <div>⭐ Total Level: <span id="trainer-level">0</span> | 🏆 Badges: <span id="badge-count">0</span></div>

            </div>
            <div>💰 <span id="coin-amount">0</span> coins</div>
        </div>

        <div id="gym-view">
            <div id="player-view">
                <div id="gym-list" class="gym-grid">Loading gyms...</div>
            </div>
            <div id="admin-panel" class="hidden">
                <div class="flex-between">
                    <h2>Manage Gyms</h2>
                    <button id="create-gym-btn" class="btn btn-success">➕ Create New Gym</button>
                </div>
                <div id="admin-gym-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">Loading...</div>

        <div id="battle-container" class="hidden">
            <div class="battle-header" id="battle-header">GYM BATTLE</div>
            <div class="battle-ui">

                    <div class="stat-box"><strong id="p-name"></strong> <span id="p-types-icons"></span><br><small id="p-lvl"></small><div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div></div><div id="p-hp-text" style="font-size:0.7rem;"></div><div id="p-xp-text" style="font-size:0.7rem;"></div></div>
                </div>

                <div id="battle-moves"></div>

                    <button id="switch-btn" class="btn btn-primary" style="background:#ff9800;">🔄 Switch</button>

                </div>
            </div>
        </div>

    <!-- Modals -->
    <div id="gym-preview-modal" class="overlay hidden"><div class="modal" style="max-width:600px;"><div class="flex-between"><h2 id="preview-gym-name"></h2><button onclick="closePreviewModal()" style="background:none;border:none;font-size:1.5rem;">&times;</button></div><div id="preview-team-list" style="margin:20px 0;"></div><button id="confirm-gym-battle" class="btn btn-primary">Challenge Gym</button><button class="btn btn-outline" onclick="closePreviewModal()">Cancel</button></div></div>
    <div id="gym-form-modal" class="overlay hidden">
        <div class="modal" style="max-width:800px;">
            <div class="flex-between"><h3 id="form-title">Create Gym</h3><button onclick="document.getElementById('gym-form-modal').classList.add('hidden')" style="background:none;border:none;font-size:1.5rem;">&times;</button></div>
            <div style="text-align:left;">
                <div class="form-group"><label>Gym Name</label><input type="text" id="gym-name" placeholder="e.g., Pewter Gym"></div>
                <div class="form-group">
    
                <div class="form-group"><label>Badge Image (path in badges/ folder)</label><input type="text" id="gym-badge" placeholder="badges/boulder_badge.png"></div>
                                    <label>Badge Name</label>
                    <input type="text" id="gym-badge-name" placeholder="e.g., Boulder Badge">
                </div>
              
                <div class="form-group"><label>Gym Image (path in gym/ folder)</label><input type="text" id="gym-image" placeholder="gym/pewter.png"></div>
                <div class="form-group"><label>Required Trainer Level</label><input type="number" id="gym-req-level" value="0" min="0"></div>
                <div class="form-group"><label>XP Reward (total)</label><input type="number" id="gym-xp-reward" value="0" min="0" placeholder="0 = auto (sum of levels ×15)"></div>
                <div class="form-group"><label>Coin Reward (total)</label><input type="number" id="gym-coin-reward" value="0" min="0" placeholder="0 = auto (sum of levels ×5)"></div>
                <div class="form-group"><label>Team (1-6 Pokémon)</label><div id="team-editor"></div><button type="button" id="add-pokemon-btn" class="btn btn-outline btn-sm">+ Add Pokémon</button></div>
            </div>
            <div style="margin-top:20px;"><button id="save-gym-btn" class="btn btn-primary">Save Gym</button><button id="cancel-gym-btn" class="btn btn-outline">Cancel</button></div>

    <div id="edit-gym-pokemon-modal" class="overlay hidden"><div class="modal" style="max-width:800px;"><div class="flex-between"><h3>Edit Pokémon</h3><button onclick="document.getElementById('edit-gym-pokemon-modal').classList.add('hidden')" style="background:none;border:none;font-size:1.5rem;">&times;</button></div><div id="edit-gym-pokemon-form"></div></div></div>
    <div id="pre-battle-select-modal" class="overlay hidden"><div class="modal"><h3>Choose your lead Pokémon</h3><div id="pre-battle-select-list"></div><button id="cancel-pre-battle" class="btn btn-outline">Cancel</button></div></div>
    <div id="switch-pokemon-modal" class="overlay hidden"><div class="modal"><h3>Switch Pokémon</h3><div id="switch-pokemon-list"></div><button onclick="closeSwitchModal()" class="btn btn-outline">Cancel</button></div></div>
    <div id="battle-summary-modal" class="overlay hidden"><div class="modal"><h2 id="summary-header"></h2><div id="summary-details"></div><button id="close-summary-btn" class="btn btn-primary">Continue</button></div></div>
    <div id="animated-sprite-modal" class="overlay hidden"><div class="modal" style="max-width:500px;"><div class="flex-between"><h2 id="animated-title"></h2><button onclick="this.closest('.overlay').classList.add('hidden')" style="background:none;border:none;font-size:1.5rem;">&times;</button></div><img id="animated-sprite-img" style="width:200px;height:200px;object-fit:contain;margin:10px auto;"><div id="animated-info"></div><div id="animated-error" style="color:var(--danger);"></div><button id="retry-animated-btn" class="btn btn-outline">Retry</button></div></div>

    <footer>Created by Tootzkie Custodio – Gym Battle System</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, addDoc, updateDoc, deleteDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkCE0wBrsQ1s-7zplvTtWOSE28ISaCFfQ",
            authDomain: "pokesim-7f9b7.firebaseapp.com",
            projectId: "pokesim-7f9b7",
            storageBucket: "pokesim-7f9b7.firebasestorage.app",
            messagingSenderId: "1087100425430",
            appId: "1:1087100425430:web:9558a79ee5330d4a792577"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ---------- Global state ----------
        let currentUser = null;
        let isAdmin = false;
        let currentBattle = null;
        let isProcessing = false;
        let gymsCache = [];
        let moveDatabase = [];
        let isMoveDatabaseLoaded = false;
        let allPokemon = [];
        let playerTeamCache = [];

        // ---------- Helper functions (same as admin.html) ----------
        function getTypeColor(type) {
            const colors = { normal:'#A8A77A', fire:'#EE8130', water:'#6390F0', electric:'#F7D02C', grass:'#7AC74C', ice:'#96D9D6', fighting:'#C22E28', poison:'#A33EA1', ground:'#E2BF65', flying:'#A98FF3', psychic:'#F95587', bug:'#A6B91A', rock:'#B6A136', ghost:'#735797', dragon:'#6F35FC', dark:'#705746', steel:'#B7B7CE', fairy:'#D685AD' };
            return colors[type] || '#777';
        }
        function generateTypeBadges(types) { return types.map(t => `<span class="type-badge" style="background:${getTypeColor(t)};">${t.toUpperCase()}</span>`).join(''); }
        function getStaticSpriteUrl(id) { return [`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`]; }
        function getBattleSpriteUrl(id, side='front') { const base = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown`; if(side==='back') return [`${base}/back/${id}.gif`, `${base}/${id}.gif`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${id}.png`, getStaticSpriteUrl(id)[0]]; else return [`${base}/${id}.gif`, ...getStaticSpriteUrl(id)]; }
        function getShowdownSpriteUrl(id) { return [`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/${id}.gif`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.gif`]; }
        function loadImageWithFallback(img, urls) { let i=0; function next() { if(i>=urls.length) return; img.src=urls[i]; img.onerror=()=>{ i++; next(); }; } next(); }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function getExpNeeded(lvl) { return lvl*300; }

        function getBonusIconHTML(bonusStats) {
            let html = '';
            if (bonusStats?.atk) html += '<span class="bonus-icon atk">⚔️</span>';
            if (bonusStats?.def) html += '<span class="bonus-icon def">🛡️</span>';
            if (bonusStats?.spd) html += '<span class="bonus-icon spd">🏃</span>';
            return html;
        }

        const typeToId = {
            normal: 1, fighting: 2, flying: 3, poison: 4, ground: 5, rock: 6, bug: 7, ghost: 8, steel: 9,
            fire: 10, water: 11, grass: 12, electric: 13, psychic: 14, ice: 15, dragon: 16, dark: 17, fairy: 18

        // ---------- Cached data loading (same as admin.html) ----------
        const CACHE_EXPIRY_DAYS = 7;
        async function loadMoveDatabase() {
            if (isMoveDatabaseLoaded) return;
            const cacheKey = 'pokesim_move_db';
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const { data, timestamp } = JSON.parse(cached);
                    if ((Date.now() - timestamp) < CACHE_EXPIRY_DAYS * 86400000) {
                        moveDatabase = data;
                        isMoveDatabaseLoaded = true;
                        console.log(`Loaded ${moveDatabase.length} moves from cache.`);
                        return;
                    }
                } catch(e) {}
            }
            console.log("Fetching move database from PokeAPI...");
            try {
                const listRes = await fetch('https://pokeapi.co/api/v2/move?limit=2000&offset=0');
                const listData = await listRes.json();
                const moveDetails = [];
                for (let i = 0; i < listData.results.length; i++) {
                    const move = listData.results[i];
                    try {
                        const detail = await fetch(move.url).then(r => r.json());
                        if (detail.power && detail.accuracy && detail.power > 0 && detail.accuracy > 0) {
                            moveDetails.push({
                                name: detail.name,
                                type: detail.type.name,
                                power: detail.power,
                                accuracy: detail.accuracy
                            });
                        }
                    } catch(e) {}
                }
                moveDatabase = moveDetails;
                isMoveDatabaseLoaded = true;
                localStorage.setItem(cacheKey, JSON.stringify({ data: moveDatabase, timestamp: Date.now() }));
                console.log(`Cached ${moveDatabase.length} damaging moves.`);
            } catch(e) { console.error(e); }
        }

        async function loadAllPokemon() {
            if (allPokemon.length) return;
            const cacheKey = 'pokesim_pokemon_list';
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const { data, timestamp } = JSON.parse(cached);
                    if ((Date.now() - timestamp) < CACHE_EXPIRY_DAYS * 86400000) {
                        allPokemon = data;
                        console.log(`Loaded ${allPokemon.length} Pokémon from cache.`);
                        return;
                    }
                } catch(e) {}
            }
            console.log("Fetching Pokémon list from PokeAPI...");
            try {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000&offset=0');
                const data = await res.json();
                const promises = data.results.map(async (p, idx) => {
                    const id = idx + 1;
                    const detail = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r => r.json());
                    return {
                        id,
                        name: detail.name,
                        types: detail.types.map(t => t.type.name),
                        sprite: getStaticSpriteUrl(id)[0]
                    };
                });
                allPokemon = await Promise.all(promises);
                localStorage.setItem(cacheKey, JSON.stringify({ data: allPokemon, timestamp: Date.now() }));
                console.log(`Cached ${allPokemon.length} Pokémon.`);
            } catch(e) { console.error(e); }
        }

        // ---------- Battle scene management ----------
        function showBattleScene() {

        // ---------- Battle logic (fully functional) ----------
        function getEffectiveSpeed(p) { let s = p.level; if(p.bonusStats?.spd) s = Math.floor(s*1.25); return s; }
        function getFirstAttacker(a,b) { const sa=getEffectiveSpeed(a), sb=getEffectiveSpeed(b); if(sa>sb) return 'player'; if(sb>sa) return 'opponent'; return Math.random()<0.5 ? 'player':'opponent'; }
        function applyDamageModifiers(dmg, atkBonus, defBonus) { let m=1; if(atkBonus?.atk) m*=1.25; if(defBonus?.def) m*=0.75; return Math.floor(dmg*m); }
        function executeAttack(attacker, defender, move, isPlayerAttacking) {
            let eff = getTypeEffectiveness(move.type, defender.types);
            let effText = eff===2 ? "Super effective!" : (eff===0.5 ? "Not very effective..." : (eff===0 ? "No effect!" : ""));
            let dmg = Math.floor((move.power/5) * (attacker.level/2) * eff);
            if(dmg<1 && eff>0) dmg=1;
            dmg = applyDamageModifiers(dmg, attacker.bonusStats, defender.bonusStats);
            defender.currentHp = Math.max(0, defender.currentHp - dmg);
            const sprite = isPlayerAttacking ? document.getElementById('e-sprite-btl') : document.getElementById('p-sprite-btl');
            if(sprite) { sprite.classList.remove('shake-effect'); void sprite.offsetWidth; sprite.classList.add('shake-effect'); }
            addBattleLog(`${attacker.name.toUpperCase()} used ${move.name.toUpperCase()}! Deals ${dmg} dmg. ${effText}`);
            return defender.currentHp <= 0;
        }
        function addBattleLog(msg) { const log=document.getElementById('battle-log'); log.innerHTML+=`<div>> ${msg}</div>`; log.scrollTop=log.scrollHeight; }

        async function runTurn(selectedMove) {
            if(isProcessing) return;
            isProcessing=true;
            toggleBattleUI(true);
            addBattleLog("Trainer is concentrating...");
            setTimeout(async () => {
                if(!currentBattle) { isProcessing=false; toggleBattleUI(false); return; }
                const b = currentBattle;
                const player = b.playerTeam[b.activePlayerIdx];
                const opponent = b.opponentTeam[b.activeOpponentIdx];
                const first = getFirstAttacker(player, opponent);
                const getRandomMove = (p) => { const avail = p.moves.filter(m=>m.power>0); if(!avail.length) return { name:"Struggle", power:50, type:"normal" }; return avail[Math.floor(Math.random()*avail.length)]; };
                if(first === 'player') {
                    const oppFainted = executeAttack(player, opponent, selectedMove, true);
                    renderBattleUI();
                    if(oppFainted) {
                        addBattleLog(`${opponent.name.toUpperCase()} fainted!`);
                        b.activeOpponentIdx++;
                        if(b.activeOpponentIdx >= b.opponentTeam.length) {
                            addBattleLog("You defeated the whole team! Victory!");
                            await resolveBattle(true);
                            return;
                        } else {
                            const newOpp = b.opponentTeam[b.activeOpponentIdx];
                            addBattleLog(`Leader sends out ${newOpp.name.toUpperCase()}!`);
                            renderBattleUI();
                            isProcessing=false;
                            toggleBattleUI(false);
                            return;
                        }
                    }
                    setTimeout(() => {
                        if(!currentBattle) return;
                        const playerFainted = executeAttack(opponent, player, getRandomMove(opponent), false);
                        renderBattleUI();
                        if(playerFainted) handlePlayerFaint();
                        else { isProcessing=false; toggleBattleUI(false); }
                    }, 1000);
                } else {
                    const playerFainted = executeAttack(opponent, player, getRandomMove(opponent), false);
                    renderBattleUI();
                    if(playerFainted) { handlePlayerFaint(); return; }
                    setTimeout(() => {
                        if(!currentBattle) return;
                        const oppFainted = executeAttack(player, opponent, selectedMove, true);
                        renderBattleUI();
                        if(oppFainted) {
                            addBattleLog(`${opponent.name.toUpperCase()} fainted!`);
                            b.activeOpponentIdx++;
                            if(b.activeOpponentIdx >= b.opponentTeam.length) {
                                addBattleLog("You defeated the whole team! Victory!");
                                resolveBattle(true);
                                return;
                            } else {
                                const newOpp = b.opponentTeam[b.activeOpponentIdx];
                                addBattleLog(`Leader sends out ${newOpp.name.toUpperCase()}!`);
                                renderBattleUI();
                                isProcessing=false;
                                toggleBattleUI(false);
                            }
                        } else { isProcessing=false; toggleBattleUI(false); }
                    }, 1000);
                }
            }, 3000);
        }

        async function handlePlayerFaint() {
            const b = currentBattle;
            const available = b.playerTeam.filter(p => p.currentHp > 0);
            if(available.length === 0) {
                addBattleLog("All your Pokémon have fainted! You lost.");
                await resolveBattle(false);
                return;
            }
            addBattleLog(`${b.playerTeam[b.activePlayerIdx].name.toUpperCase()} fainted! Choose another.`);
            const selected = await showSwitchModal(available, b.playerTeam[b.activePlayerIdx].id);
            if(!selected) { resolveBattle(false); return; }
            const newIdx = b.playerTeam.findIndex(p => p.id === selected.id);
            b.activePlayerIdx = newIdx;
            b.playerTeam[newIdx].currentHp = b.playerTeam[newIdx].maxHp;
            renderBattleUI();
            addBattleLog(`Go! ${b.playerTeam[newIdx].name.toUpperCase()}!`);
            isProcessing = false;
            toggleBattleUI(false);
        }

        async function resolveBattle(win) {
            let xpGain = 0, coinsGain = 0, leveledUp = false;
            if(win && currentBattle.type === 'gym') {
                const userId = currentUser.uid;
                const userRef = doc(db, "users", userId);
                const userDoc = await getDoc(userRef);
                const badges = userDoc.data()?.badges || [];
                const isFirstWin = !badges.includes(currentBattle.gymId);
                if(isFirstWin) {
                    await updateDoc(userRef, { badges: arrayUnion(currentBattle.gymId) });
                }
                const player = currentBattle.playerTeam[currentBattle.activePlayerIdx];
                const gymData = gymsCache.find(g => g.id === currentBattle.gymId);
                if (gymData?.xpReward && gymData.xpReward > 0) {
                    xpGain = gymData.xpReward;
                } else {
                    xpGain = Math.floor(currentBattle.opponentTeam.reduce((sum, opp) => sum + opp.level, 0) * 15);
                }
                if (gymData?.coinReward && gymData.coinReward > 0) {
                    coinsGain = gymData.coinReward;
                } else {
                    coinsGain = Math.floor(currentBattle.opponentTeam.reduce((sum, opp) => sum + opp.level, 0) * 5);
                }
                const monRef = doc(db, "users", userId, "pokemon", player.id);
                let curExp = player.exp || 0;
                let newExp = curExp + xpGain;
                let newLvl = player.level;
                while(newExp >= getExpNeeded(newLvl)) {
                    newExp -= getExpNeeded(newLvl);
                    newLvl++;
                    leveledUp = true;
                }
                await updateDoc(monRef, { exp: newExp, level: newLvl });
                await updateDoc(userRef, { coins: increment(coinsGain), totalLevels: increment(newLvl - player.level) });
                player.exp = newExp;
                player.level = newLvl;
                await updateTrainerCard();
            }
            showBattleSummary(win, { xp: xpGain, coins: coinsGain, leveledUp, isFirstWin: win && currentBattle && !currentUser.badges?.includes(currentBattle.gymId) });
        }

        function showBattleSummary(win, rewards = {}) {
            const modal = document.getElementById('battle-summary-modal');
            const header = document.getElementById('summary-header');
            const details = document.getElementById('summary-details');
            if(win) {
                header.innerText = "VICTORY!";
                header.style.color = "var(--success)";
                let rewardHtml = `<p>You defeated the gym leader!</p>`;
                if(rewards.xp) rewardHtml += `<div>✨ XP gained: +${rewards.xp}</div><div>💰 Coins earned: ₱${rewards.coins}</div>`;
                if(rewards.leveledUp) rewardHtml += `<div style="color:var(--success);">⭐ Your Pokémon leveled up!</div>`;
                if(rewards.isFirstWin) rewardHtml += `<div><img src="${currentBattle.badgeImage}" style="width:60px; margin-top:10px;"><br>🏅 Badge awarded!</div>`;
                details.innerHTML = rewardHtml;
            } else {
                header.innerText = "DEFEAT!";
                header.style.color = "var(--danger)";
                details.innerHTML = "<p>Better luck next time!</p>";
            }
            modal.classList.remove('hidden');
            document.getElementById('close-summary-btn').onclick = () => {
                modal.classList.add('hidden');
                hideBattleScene();
                currentBattle = null;
                isProcessing = false;
                toggleBattleUI(false);
                loadGyms();
                updateTrainerCard();
            };
        }

      function renderBattleUI() {
    const b = currentBattle;
    if(!b) return;
    const player = b.playerTeam[b.activePlayerIdx];
    const opponent = b.opponentTeam[b.activeOpponentIdx];

    // Enemy sprite (shiny or normal)
    if (opponent.isShiny) {
        loadImageWithFallback(document.getElementById('e-sprite-btl'), getShinyBattleSpriteUrl(opponent.name, opponent.pokemonId, 'front'));
    } else {
        loadImageWithFallback(document.getElementById('e-sprite-btl'), getBattleSpriteUrl(opponent.pokemonId, 'front'));
    }

    // Player sprite (shiny or normal)
    if (player.isShiny) {
        loadImageWithFallback(document.getElementById('p-sprite-btl'), getShinyBattleSpriteUrl(player.name, player.pokemonId, 'back'));
    } else {
        loadImageWithFallback(document.getElementById('p-sprite-btl'), getBattleSpriteUrl(player.pokemonId, 'back'));
    }

    // Get bonus icons
    const opponentBonusIcons = getBonusIconHTML(opponent.bonusStats);
    const playerBonusIcons = getBonusIconHTML(player.bonusStats);

        window.closeSwitchModal = () => document.getElementById('switch-pokemon-modal').classList.add('hidden');
        document.getElementById('switch-btn').onclick = async () => {
            if(isProcessing) return;
            const b = currentBattle;
            const available = b.playerTeam.filter(p => p.currentHp > 0 && p.id !== b.playerTeam[b.activePlayerIdx].id);
            if(available.length===0) { addBattleLog("No other Pokémon can switch!"); return; }
            isProcessing=true;
            toggleBattleUI(true);
            const selected = await showSwitchModal(available, b.playerTeam[b.activePlayerIdx].id);
            if(!selected) { isProcessing=false; toggleBattleUI(false); return; }
            const newIdx = b.playerTeam.findIndex(p => p.id === selected.id);
            b.activePlayerIdx = newIdx;
            b.playerTeam[newIdx].currentHp = b.playerTeam[newIdx].maxHp;
            renderBattleUI();
            addBattleLog(`Go! ${b.playerTeam[newIdx].name.toUpperCase()}!`);
            setTimeout(() => {
                const opponent = b.opponentTeam[b.activeOpponentIdx];
                const randomMove = opponent.moves.filter(m=>m.power>0)[0] || { name:"Tackle", power:40, type:"normal" };
                executeAttack(opponent, b.playerTeam[newIdx], randomMove, false);
                renderBattleUI();
                if(b.playerTeam[newIdx].currentHp <= 0) handlePlayerFaint();
                else { isProcessing=false; toggleBattleUI(false); }
            }, 1000);
        };
        document.getElementById('escape-btn').onclick = () => {
            if(isProcessing) return;
            addBattleLog("You ran away from the battle!");
            hideBattleScene();
            currentBattle = null;
            isProcessing=false;
            toggleBattleUI(false);
        };

        async function startGymBattle(gymId) {
            const gym = gymsCache.find(g => g.id === gymId);
            if (!gym) return;
            const playerTeam = await fetchPlayerTeam();
            if (playerTeam.length === 0) return alert("You have no Pokémon in your team!");
            const opponentTeam = [];
            for (let p of gym.team) {
                opponentTeam.push({
                    pokemonId: p.pokemonId, name: p.name, level: p.level, moves: p.moves,
                    types: p.types, maxHp: p.level * 25, currentHp: p.level * 25,
                    bonusStats: p.bonusStats || { atk:false, def:false, spd:false },
                    isShiny: p.isShiny || false
                });
            }
            const selected = await showPreBattleSelect(playerTeam);
            if (!selected) return;
            const activeIdx = playerTeam.findIndex(p => p.id === selected.id);
            playerTeam[activeIdx].currentHp = playerTeam[activeIdx].maxHp;
            currentBattle = {
                type: 'gym', gymId: gym.id, gymName: gym.name, badgeImage: gym.badgeImage,
                playerTeam: playerTeam, activePlayerIdx: activeIdx,
                opponentTeam: opponentTeam, activeOpponentIdx: 0
            };
            renderBattleUI();
            document.getElementById('battle-header').innerHTML = `⚔️ GYM BATTLE: ${gym.name} ⚔️`;
            showBattleScene();
            addBattleLog(`Battle against Gym Leader ${gym.name}!`);
        }

        // ---------- Species Input Component (exactly like admin.html) ----------
        async function getPokemonById(id) {
            let pokemon = allPokemon.find(p => p.id === id);
            if (pokemon) return pokemon;
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                if (!res.ok) return null;
                const data = await res.json();
                return {
                    id: id,
                    name: data.name,
                    types: data.types.map(t => t.type.name),
                    sprite: getStaticSpriteUrl(id)[0]
                };
            } catch (err) {
                return null;
            }
        }

        async function createSpeciesInput(currentId, onChange) {
            const container = document.createElement('div');
            container.className = 'form-group';
            container.innerHTML = `
                <label>Pokémon ID / Name</label>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <input type="number" id="species-id-input" class="species-id-input" value="${currentId}" min="1" max="10400" step="1" style="flex: 1;">
                    <input type="text" id="species-name-input" class="species-name-input" placeholder="or enter name" list="pokemon-names" style="flex: 2;">
                    <datalist id="pokemon-names">
                        ${allPokemon.map(p => `<option value="${p.name}">`).join('')}
                    </datalist>
                </div>
                <div id="species-preview" class="species-preview">
                    <img id="species-sprite" src="" alt="">
                    <div class="preview-info">
                        <div id="species-info">Loading...</div>
                    </div>
                    <button id="view-animated-btn" class="animated-btn" style="margin-left: auto;">🎬 View Animated</button>
                </div>
            `;
            const idInput = container.querySelector('#species-id-input');
            const nameInput = container.querySelector('#species-name-input');
            const spriteImg = container.querySelector('#species-sprite');
            const infoDiv = container.querySelector('#species-info');
            const viewAnimatedBtn = container.querySelector('#view-animated-btn');
            let currentSpecies = null;

            async function updatePreview() {
                if (!currentSpecies) return;
                const urls = getStaticSpriteUrl(currentSpecies.id);
                loadImageWithFallback(spriteImg, urls);
                infoDiv.innerHTML = `<strong>${currentSpecies.name.toUpperCase()}</strong> (${currentSpecies.types.join(', ')})`;
                if (onChange) onChange(currentSpecies.id, currentSpecies);
            }

            async function setSpeciesById(id) {
                const species = await getPokemonById(id);
                if (species) {
                    currentSpecies = species;
                    idInput.value = id;
                    nameInput.value = species.name;
                    await updatePreview();
                } else {
                    currentSpecies = null;
                    infoDiv.innerHTML = '<span style="color: var(--danger);">Invalid Pokémon ID</span>';
                    spriteImg.style.display = 'none';
                    if (onChange) onChange(null, null);
                }
            }

            async function onIdChange() {
                const id = parseInt(idInput.value, 10);
                if (isNaN(id) || id < 1) {
                    infoDiv.innerHTML = '<span style="color: var(--danger);">Enter a valid ID (1-1025)</span>';
                    spriteImg.style.display = 'none';
                    if (onChange) onChange(null, null);
                    return;
                }
                await setSpeciesById(id);
            }

            async function onNameChange() {
                const name = nameInput.value.toLowerCase().trim();
                if (!name) return;
                const matchingPokemon = allPokemon.find(p => p.name === name);
                if (matchingPokemon) {
                    await setSpeciesById(matchingPokemon.id);
                } else {
                    try {
                        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                        if (res.ok) {
                            const data = await res.json();
                            const species = {
                                id: data.id,
                                name: data.name,
                                types: data.types.map(t => t.type.name),
                                sprite: getStaticSpriteUrl(data.id)[0]
                            };
                            currentSpecies = species;
                            idInput.value = species.id;
                            nameInput.value = species.name;
                            await updatePreview();
                        } else {
                            infoDiv.innerHTML = '<span style="color: var(--danger);">Pokémon not found</span>';
                            spriteImg.style.display = 'none';
                            if (onChange) onChange(null, null);
                        }
                    } catch(e) {
                        infoDiv.innerHTML = '<span style="color: var(--danger);">Error searching</span>';
                    }
                }
            }

            idInput.addEventListener('input', onIdChange);
            nameInput.addEventListener('change', onNameChange);
            await setSpeciesById(currentId);

            viewAnimatedBtn.onclick = () => {
                if (!currentSpecies) {
                    alert("No Pokémon selected.");
                    return;
                }
                const modal = document.getElementById('animated-sprite-modal');
                const title = document.getElementById('animated-title');
                const img = document.getElementById('animated-sprite-img');
                const info = document.getElementById('animated-info');
                const errorDiv = document.getElementById('animated-error');
                const retryBtn = document.getElementById('retry-animated-btn');

                title.innerText = currentSpecies.name.toUpperCase();
                info.innerHTML = generateTypeBadges(currentSpecies.types);
                errorDiv.innerHTML = '';
                img.style.display = 'block';
                img.style.width = '200px';
                img.style.height = '200px';
                img.onerror = () => {
                    errorDiv.innerHTML = 'Failed to load animated sprite. Click retry.';
                    img.style.display = 'none';
                };
                const loadGif = () => {
                    img.onload = () => { img.style.display = 'block'; errorDiv.innerHTML = ''; };
                    loadImageWithFallback(img, getShowdownSpriteUrl(currentSpecies.id));
                };
                loadGif();
                retryBtn.onclick = () => loadGif();
                modal.classList.remove('hidden');
            };
            return container;
        }

        // ---------- Move Selector Component (exactly like admin.html) ----------
        function renderMoveSelector(containerId, currentMoves, onChange) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = `
                <input type="text" class="move-search" placeholder="Search moves...">
                <div class="move-table-container">
                    <table class="move-table">
                        <thead>
                             <tr><th>Move</th><th>Type</th><th>Power</th><th style="width: 50px;">Select</th> </thead>
                        </thead>
                        <tbody id="move-table-body"></tbody>
                    </table>
                </div>
                <div class="selected-moves-preview" style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px;"></div>
            `;
            const searchInput = container.querySelector('.move-search');
            const tbody = container.querySelector('#move-table-body');
            const previewDiv = container.querySelector('.selected-moves-preview');
            const selected = [...currentMoves];
            const updatePreview = () => {
                previewDiv.innerHTML = selected.map(m => `
                    <span style="background: ${getTypeColor(m.type)}; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem;">
                        ${m.name.toUpperCase()} (${m.power})
                        <button class="remove-move" data-name="${m.name}" style="background: none; border: none; color: white; margin-left: 5px; cursor: pointer;">✕</button>
                    </span>
                `).join('');
                document.querySelectorAll('.remove-move').forEach(btn => {
                    btn.onclick = () => {
                        const name = btn.dataset.name;
                        const idx = selected.findIndex(m => m.name === name);
                        if (idx !== -1) selected.splice(idx, 1);
                        updateTable();
                        updatePreview();
                        if (onChange) onChange(selected);
                    };
                });
            };
            const updateTable = () => {
                const searchTerm = searchInput.value.toLowerCase();
                const filtered = moveDatabase.filter(m => m.name.includes(searchTerm));
                tbody.innerHTML = filtered.map(m => `
                    <tr data-name="${m.name}">
                        <td>${m.name.toUpperCase()}</td>
                        <td><span class="type-badge" style="background: ${getTypeColor(m.type)};">${m.type.toUpperCase()}</span></td>
                        <td>${m.power}</td>
                        <td class="move-select"><input type="checkbox" ${selected.some(s => s.name === m.name) ? 'checked' : ''}></td>
                    </tr>
                `).join('');
                tbody.querySelectorAll('tr').forEach(tr => {
                    const name = tr.dataset.name;
                    const move = moveDatabase.find(m => m.name === name);
                    const cb = tr.querySelector('input');
                    cb.onchange = () => {
                        if (cb.checked) {
                            if (selected.length < 4) {
                                selected.push({
                                    name: move.name,
                                    type: move.type,
                                    power: move.power,
                                    accuracy: move.accuracy,
                                    effect: '-',
                                    effectAccuracy: '-',
                                    icon: '✨'
                                });
                            } else {
                                alert('You can only select up to 4 moves.');
                                cb.checked = false;
                            }
                        } else {
                            const idx = selected.findIndex(s => s.name === name);
                            if (idx !== -1) selected.splice(idx, 1);
                        }
                        updatePreview();
                        if (onChange) onChange(selected);
                    };
                });
            };
            searchInput.addEventListener('input', updateTable);
            updateTable();
            updatePreview();
            if (onChange) onChange(selected);
        }

            if (!allPokemon.length) await loadAllPokemon();
            tempTeam.push({
                pokemonId: 25, name: 'Pikachu', level: 50, types: ['electric'],
                moves: [{ name: 'thunderbolt', type: 'electric', power: 90, accuracy: 100 }],
                bonusStats: { atk: false, def: false, spd: false }, isShiny: false
            });
            renderTeamEditor();
        };
        document.getElementById('save-gym-btn').onclick = async () => {
            const name = document.getElementById('gym-name').value.trim();
            if (!name) return alert('Gym name required');
            const badgeImage = document.getElementById('gym-badge').value.trim();
            const badgeName = document.getElementById('gym-badge-name').value.trim();
            const gymImage = document.getElementById('gym-image').value.trim();
            const requiredLevel = parseInt(document.getElementById('gym-req-level').value);
            const xpReward = parseInt(document.getElementById('gym-xp-reward').value) || 0;
            const coinReward = parseInt(document.getElementById('gym-coin-reward').value) || 0;
            if (tempTeam.length === 0) return alert('At least one Pokémon required');
            const gymData = { name, badgeImage, gymImage, requiredLevel, team: tempTeam,badgeName, xpReward, coinReward };
            if (currentEditingGymId) await updateDoc(doc(db, "gyms", currentEditingGymId), gymData);
            else await addDoc(collection(db, "gyms"), gymData);
            document.getElementById('gym-form-modal').classList.add('hidden');
            loadGyms();
        };
        document.getElementById('cancel-gym-btn').onclick = () => document.getElementById('gym-form-modal').classList.add('hidden');

        // ---------- Auth ----------
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                const data = userDoc.data();
                if (data?.active === false) { alert("Account deactivated"); signOut(auth); return; }
                currentUser = { uid: user.uid, totalLevels: data?.totalLevels || 0, badges: data?.badges || [] };
                isAdmin = data?.role === 'admin';
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                if (isAdmin) document.getElementById('admin-panel-toggle').classList.remove('hidden');
                document.getElementById('admin-panel-toggle').onclick = () => {
                    const panel = document.getElementById('admin-panel');
                    panel.classList.toggle('hidden');
                    if (!panel.classList.contains('hidden')) loadGyms();
                };
                document.getElementById('create-gym-btn').onclick = () => openGymForm();
                // Do NOT load heavy data on page load. They will be loaded when needed.
                // await Promise.all([loadAllPokemon(), loadMoveDatabase()]);
                await loadGyms();
                await updateTrainerCard();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
                document.getElementById('auth-message').innerText = "Please log in to access gym battles.";
                document.getElementById('redirect-login').style.display = 'inline-block';
                document.getElementById('redirect-login').onclick = () => window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
