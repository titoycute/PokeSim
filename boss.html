<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>PokeSim | World Boss Raid</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; }
        :root {
            --bg: #f0f2f5; --card-bg: #ffffff; --primary: #3b4cca; --primary-dark: #00238f;
            --accent: #ffde00; --text-dark: #2d3748; --text-light: #5a6e8a; --border: #e2e8f0;
            --success: #48bb78; --danger: #f56565; --warning: #ed8936; --gold: #f6ad55;
        }
        body { background: var(--bg); min-height: 100vh; color: var(--text-dark); padding: 20px; }
        body.dark-theme {
            --bg: #1a1e2c; --card-bg: #2d2f3e; --primary: #6c5ce7; --primary-dark: #5a4ad1;
            --accent: #ff7675; --text-dark: #e2e8f0; --text-light: #a0aec0; --border: #3d4050;
            --success: #4cd964; --danger: #ff5e5e; --warning: #ff9f43;
        }
        .hidden { display: none !important; }
        .btn { padding: 8px 16px; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-light); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--warning)); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 0.75rem; }
        .top-bar { background: var(--card-bg); padding: 12px 24px; border-radius: 40px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; border: 1px solid var(--border); }
        .user-chip { background: #eef2ff; padding: 5px 14px; border-radius: 40px; font-size: 0.8rem; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }
        .raid-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .raid-card { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; transition: 0.2s; }
        .raid-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .raid-banner { padding: 16px; text-align: center; background: linear-gradient(135deg, #2d3748, #1a202c); color: white; position: relative; }
        .raid-name { font-size: 1.3rem; font-weight: 800; }
        .raid-stats { padding: 16px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.03); border-bottom: 1px solid var(--border); }
        .raid-damage { font-size: 0.9rem; color: var(--primary-dark); font-weight: bold; }
        .leaderboard-preview { max-height: 180px; overflow-y: auto; padding: 12px; }
        .leaderboard-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 5000; padding: 16px; }
        .modal-box { background: var(--card-bg); border-radius: 28px; width: 100%; max-width: 700px; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 40px rgba(0,0,0,0.3); }
        .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text-dark); }
        .type-badge { display: inline-block; padding: 2px 8px; border-radius: 16px; font-size: 0.7rem; font-weight: bold; color: white; margin-right: 4px; }
        .reward-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .battle-ui-container { background: linear-gradient(145deg, #87CEEB 0%, #c0e0ff 40%, #78c850 100%); border-radius: 24px; overflow: hidden; max-width: 700px; margin: 0 auto; }
        .battle-header { background: var(--primary-dark); color: white; text-align: center; padding: 12px; font-weight: bold; }
        .battle-ui { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .side { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .enemy-side { justify-content: flex-end; }
        .stat-box { background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); padding: 12px 16px; border-radius: 20px; width: 220px; border-left: 4px solid var(--primary); }
        .hp-bar { background: #e2e8f0; height: 8px; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .hp-fill { height: 100%; background: var(--success); width: 100%; }
        #battle-log { background: rgba(0,0,0,0.7); color: #e0e0e0; padding: 12px; font-family: monospace; height: 80px; overflow-y: auto; border-radius: 16px; margin: 10px 0; }
        #battle-moves { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .move-btn { background: #a0aec0; border: none; border-radius: 32px; padding: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .pokemon-select-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: var(--card-bg); border-radius: 20px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); }
        .pokemon-select-item:hover { background: #eef2ff; transform: translateX(4px); }
        .pokemon-select-item img { width: 60px; height: 60px; object-fit: contain; background: #f8fafc; border-radius: 12px; padding: 4px; }
        .pokemon-select-info { flex: 1; text-align: left; }
        .move-list-small { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .move-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.62rem; font-weight: 600; color: white; text-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .hp-bar-small { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-top: 4px; }
        .hp-fill-small { height: 100%; background: var(--success); width: 100%; }
        .bonus-icon { display: inline-block; margin: 0 2px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary-dark); color: white; padding: 10px 24px; border-radius: 40px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; margin-top: 40px; color: var(--text-light); font-size: 0.75rem; }
        .move-icon { width: 28px; height: 28px; object-fit: contain; margin-right: 6px; }

        /* Boss effect auras */
        .fx-legendary-aura img { filter: drop-shadow(0 0 8px gold) drop-shadow(0 0 15px #ffaa00); }
        .fx-void-aura img { filter: drop-shadow(0 0 8px #0af) drop-shadow(0 0 15px #00f); }
        .fx-cosmic-aura img { filter: drop-shadow(0 0 8px #f6f) drop-shadow(0 0 15px #c0f); }
        .effect-badge { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: #ffd966; font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; white-space: nowrap; font-weight: bold; letter-spacing: 0.5px; }
        
        /* Card sprite auras */
        .raid-sprite-img.effect-legendary { filter: drop-shadow(0 0 8px gold) drop-shadow(0 0 15px #ffaa00) drop-shadow(0 0 25px rgba(255,215,0,0.5)); animation: legendaryPulse 2s infinite ease-in-out; }
        .raid-sprite-img.effect-void { filter: drop-shadow(0 0 8px #0af) drop-shadow(0 0 15px #00f) drop-shadow(0 0 25px rgba(0,100,255,0.5)); animation: voidPulse 1.5s infinite alternate; }
        .raid-sprite-img.effect-cosmic { filter: drop-shadow(0 0 8px #f6f) drop-shadow(0 0 15px #c0f) drop-shadow(0 0 25px rgba(200,0,255,0.5)); animation: cosmicPulse 2.5s infinite ease-in-out; }
        .raid-sprite-img.effect-blaze { filter: drop-shadow(0 0 8px #f60) drop-shadow(0 0 15px #f30) drop-shadow(0 0 25px rgba(255,50,0,0.5)); animation: blazePulse 1s infinite alternate; }

        @keyframes legendaryPulse { 0%, 100% { filter: drop-shadow(0 0 5px gold) drop-shadow(0 0 10px #ffaa00); } 50% { filter: drop-shadow(0 0 15px gold) drop-shadow(0 0 30px #ffaa00); } }
        @keyframes voidPulse { from { filter: drop-shadow(0 0 5px #0af) drop-shadow(0 0 10px #00f); } to { filter: drop-shadow(0 0 15px #0af) drop-shadow(0 0 30px #00f); } }
        @keyframes cosmicPulse { 0%, 100% { filter: drop-shadow(0 0 5px #f6f) drop-shadow(0 0 10px #c0f); transform: scale(1); } 50% { filter: drop-shadow(0 0 20px #f6f) drop-shadow(0 0 35px #c0f); transform: scale(1.02); } }
        @keyframes blazePulse { from { filter: drop-shadow(0 0 5px #f60) drop-shadow(0 0 10px #f30); } to { filter: drop-shadow(0 0 20px #f60) drop-shadow(0 0 40px #f00); } }
   
        .move-table-wrap {
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
}
.move-table {
    width: 100%;
    border-collapse: collapse;
}
.move-table th {
    background: var(--bg);
    padding: 8px;
    font-size: 0.7rem;
    font-weight: 700;
    position: sticky;
    top: 0;
}
.move-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
}
.move-check {
    text-align: center;
    width: 50px;
}
.move-check input {
    width: 18px;
    height: 18px;
    cursor: pointer;
}
.move-search-input {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 40px;
    width: 100%;
    margin-bottom: 8px;
    background: var(--bg);
}
.selected-moves-row {
    min-height: 40px;
    padding: 6px;
    background: var(--bg);
    border-radius: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.sel-move-pill {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: bold;
    color: white;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.sel-move-pill button {
    background: rgba(0,0,0,0.3);
    border: none;
    color: white;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    cursor: pointer;
    font-size: 10px;
}
.reward-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    background: var(--bg);
    padding: 8px;
    border-radius: 12px;
    flex-wrap: wrap;
}
.inactive-raid {
    opacity: 0.75;
    border: 2px solid var(--danger) !important;
}

.inactive-raid .raid-banner {
    background: linear-gradient(135deg, #4a4a4a, #2d2d2d);
}

.inactive-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--danger);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: bold;
    z-index: 10;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}
.move-table td:first-child {
    max-width: 200px;
    white-space: normal;
    word-break: break-word;
    font-size: 0.7rem;
}
.move-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}
.move-table th:first-child { width: 40%; }
.move-table th:nth-child(2) { width: 20%; }
.move-table th:nth-child(3) { width: 15%; }
.move-table th:nth-child(4) { width: 10%; }
/* ========== RESPONSIVE DESIGN ========== */

/* Base responsive adjustments */
* {
    -webkit-tap-highlight-color: transparent;
}

/* Container responsiveness */
.container, .main-wrap, .raid-list-container {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 12px;
}

/* ========== TOP BAR RESPONSIVE ========== */
@media (max-width: 768px) {
    .top-bar {
        flex-direction: column;
        text-align: center;
        padding: 12px 16px;
        border-radius: 20px;
    }
    
    .top-bar > div:last-child {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
    }
    
    .user-chip {
        font-size: 0.7rem;
        padding: 4px 10px;
    }
    
    .btn-sm {
        padding: 4px 10px;
        font-size: 0.7rem;
    }
}

/* ========== RAID GRID RESPONSIVE ========== */
@media (max-width: 1024px) {
    .raid-grid {
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
    }
}

@media (max-width: 768px) {
    .raid-grid {
        grid-template-columns: 1fr;
        gap: 16px;
    }
}

/* ========== RAID CARD RESPONSIVE ========== */
@media (max-width: 768px) {
    .raid-card {
        border-radius: 20px;
    }
    
    .raid-banner {
        padding: 12px;
    }
    
    .raid-name {
        font-size: 1.1rem;
    }
    
    .raid-banner img {
        width: 80px;
        height: 80px;
    }
    
    .raid-stats {
        flex-direction: column;
        gap: 8px;
        text-align: center;
    }
    
    .raid-damage, .raid-attempts {
        font-size: 0.8rem;
    }
    
    .raid-card .btn {
        flex: 1;
        justify-content: center;
        font-size: 0.7rem;
        padding: 6px 10px;
    }
    
    .raid-card > div:last-child {
        flex-wrap: wrap;
        gap: 6px;
    }
    
    .raid-card > div:last-child .btn {
        min-width: calc(33% - 6px);
    }
    
    .leaderboard-preview {
        max-height: 140px;
    }
}

/* ========== BATTLE UI RESPONSIVE ========== */
@media (max-width: 768px) {
    .battle-ui-container {
        border-radius: 16px;
        margin: 0 8px;
    }
    
    .battle-header {
        padding: 8px;
        font-size: 0.8rem;
    }
    
    .battle-ui {
        padding: 12px;
        gap: 12px;
    }
    
    .side {
        gap: 8px;
    }
    
    .stat-box {
        width: 180px;
        padding: 8px 12px;
        font-size: 0.75rem;
    }
    
    .btl-sprite {
        width: 80px !important;
        height: 80px !important;
    }
    
    #battle-moves {
        grid-template-columns: 1fr;
        gap: 8px;
    }
    
    .move-btn {
        padding: 8px 12px;
        font-size: 0.75rem;
    }
    
    .move-icon {
        width: 22px !important;
        height: 22px !important;
    }
    
    .catch-area {
        flex-wrap: wrap;
        gap: 8px;
    }
    
    .catch-area .btn {
        flex: 1;
        justify-content: center;
        font-size: 0.75rem;
        padding: 8px 12px;
    }
    
    #battle-log {
        height: 100px;
        font-size: 0.7rem;
    }
}

/* ========== MODAL RESPONSIVE ========== */
@media (max-width: 768px) {
    .modal-box {
        max-width: 95%;
        max-height: 90vh;
        border-radius: 20px;
    }
    
    .modal-head {
        padding: 12px 16px;
    }
    
    .modal-head h3 {
        font-size: 1rem;
    }
    
    .modal-body {
        padding: 12px;
    }
    
    .form-group label {
        font-size: 0.7rem;
    }
    
    input, select, textarea {
        padding: 6px 10px;
        font-size: 0.85rem;
    }
    
    .form-row, .form-row.three {
        grid-template-columns: 1fr;
        gap: 10px;
    }
    
    .modal-foot {
        padding: 12px;
        flex-wrap: wrap;
    }
    
    .modal-foot .btn {
        flex: 1;
        justify-content: center;
    }
}

/* ========== POKEMON SELECT MODAL RESPONSIVE ========== */
@media (max-width: 768px) {
    .pokemon-select-item {
        padding: 8px;
        gap: 10px;
    }
    
    .pokemon-select-item img {
        width: 50px;
        height: 50px;
    }
    
    .pokemon-select-info strong {
        font-size: 0.85rem;
    }
    
    .pokemon-select-info small {
        font-size: 0.65rem;
    }
    
    .move-list-small .move-badge {
        font-size: 0.55rem;
        padding: 1px 6px;
    }
}

/* ========== MOVE TABLE RESPONSIVE ========== */
@media (max-width: 768px) {
    .move-table-wrap {
        max-height: 300px;
    }
    
    .move-table th, .move-table td {
        padding: 4px 6px;
        font-size: 0.65rem;
    }
    
    .move-table td:first-child {
        max-width: 120px;
        white-space: normal;
        word-break: break-word;
    }
    
    .type-badge {
        font-size: 0.55rem;
        padding: 1px 4px;
    }
}

/* ========== REWARD TIERS RESPONSIVE ========== */
@media (max-width: 768px) {
    .reward-row, .reward-tier-card {
        flex-direction: column;
        align-items: stretch;
    }
    
    .reward-rank, .reward-type {
        width: 100% !important;
    }
    
    .pokemon-reward-config {
        flex-direction: column;
    }
    
    .pokemon-reward-config > div {
        width: 100%;
    }
    
    .reward-pokemon-search {
        width: 100%;
    }
}

/* ========== LEADERBOARD RESPONSIVE ========== */
@media (max-width: 768px) {
    #leaderboard-full-list .leaderboard-item {
        font-size: 0.7rem;
        padding: 8px 0;
    }
}

/* ========== ADMIN TOOLBAR RESPONSIVE ========== */
@media (max-width: 768px) {
    #admin-toolbar {
        flex-direction: column;
        gap: 8px;
    }
    
    #admin-toolbar .btn {
        width: 100%;
        justify-content: center;
    }
}

/* ========== TOUCH FRIENDLY BUTTONS ========== */
@media (max-width: 768px) {
    button, .btn, .move-btn, .pokemon-select-item {
        cursor: default;
        min-height: 44px; /* Apple's minimum touch target size */
    }
    
    .move-btn {
        min-height: 48px;
    }
    
    input, select, textarea {
        font-size: 16px; /* Prevents zoom on iOS */
    }
}

/* ========== SMALL PHONES (max-width: 480px) ========== */
@media (max-width: 480px) {
    body {
        padding: 8px;
    }
    
    h2 {
        font-size: 1.2rem;
    }
    
    .raid-name {
        font-size: 1rem;
    }
    
    .raid-banner img {
        width: 70px;
        height: 70px;
    }
    
    .stat-box {
        width: 140px;
        font-size: 0.65rem;
    }
    
    .btn {
        font-size: 0.7rem;
        padding: 6px 12px;
    }
    
    .type-badge {
        font-size: 0.5rem;
        padding: 1px 4px;
    }
    
    .effect-badge {
        font-size: 0.5rem;
        padding: 2px 6px;
        bottom: -8px !important;
    }
    
    .inactive-badge {
        font-size: 0.55rem;
        padding: 2px 8px;
        top: 5px;
        right: 5px;
    }
}

/* ========== LANDSCAPE MODE ON MOBILE ========== */
@media (max-width: 900px) and (orientation: landscape) {
    .raid-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 2fr));
    }
    
    .battle-ui {
        flex-direction: row;
        flex-wrap: wrap;
    }
    
    .side {
        width: 100%;
    }
    
    .enemy-side {
        justify-content: flex-start;
    }
    
    .player-side {
        justify-content: flex-start;
        flex-direction: row;
    }
}

/* ========== TABLET (768px - 1024px) ========== */
@media (min-width: 769px) and (max-width: 1024px) {
    .raid-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .stat-box {
        width: 200px;
    }
}

/* ========== DESKTOP (1025px+) ========== */
@media (min-width: 1025px) {
    .raid-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

/* ========== LARGE DESKTOP (1600px+) ========== */
@media (min-width: 1600px) {
    .raid-grid {
        grid-template-columns: repeat(4, 1fr);
    }
    
    .container, .main-wrap, .raid-list-container {
        max-width: 1600px;
    }
}

/* ========== LOADING SPINNER ========== */
.loading-spinner {
    width: 30px;
    height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ========== SCROLLBAR STYLING (optional) ========== */
@media (min-width: 768px) {
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    
    ::-webkit-scrollbar-track {
        background: var(--border);
        border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
        background: var(--primary-dark);
    }
}

/* ========== UTILITY CLASSES ========== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

const firebaseConfig = { apiKey: "AIzaSyDkCE0wBrsQ1s-7zplvTtWOSE28ISaCFfQ", authDomain: "pokesim-7f9b7.firebaseapp.com", projectId: "pokesim-7f9b7", storageBucket: "pokesim-7f9b7.firebasestorage.app", messagingSenderId: "1087100425430", appId: "1:1087100425430:web:9558a79ee5330d4a792577" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null, userData = null, isAdmin = false;

// ========== BADGE EFFECTS (from map.html) ==========
let userBadgeEffects = [];

async function loadUserBadgeEffects() {
    if (!currentUser) return [];
    const userDoc = await getDoc(doc(db, "users", currentUser.uid));
    const badgeIds = userDoc.data()?.badges || [];
    const effects = [];
    for (const badgeId of badgeIds) {
        const gymDoc = await getDoc(doc(db, "gyms", badgeId));
        if (gymDoc.exists()) {
            const gym = gymDoc.data();
            if (gym.badgeEffect) {
                effects.push(gym.badgeEffect);
            }
        }
    }
    userBadgeEffects = effects;
    return effects;
}

function getTotalBadgeBonus(effectType, targetType) {
    let total = 0;
    for (const effect of userBadgeEffects) {
        if (effect.effectType === effectType && (effect.targetType === targetType || effect.targetType === '')) {
            total += effect.bonusPercent;
        }
    }
    return total;
}

// Function to get effective speed with badge bonuses (like map.html)
function getEffectiveSpeedWithBadges(pokemon, isPlayer = true) {
    let speed = pokemon.level;
    // Wild bonus SPD (25% if pokemon has spd flag)
    if (pokemon.bonusStats?.spd) speed = Math.floor(speed * 1.25);
    // Form bonus SPD (percentage from special forms)
    const formBonuses = getSpecialFormBonuses(pokemon.name, pokemon.pokemonId);
    if (formBonuses.spd > 0) speed = Math.floor(speed * (1 + formBonuses.spd / 100));
    // Badge effect for player
    if (isPlayer) {
        const spdBonus = getTotalBadgeBonus('spd', '');
        if (spdBonus > 0) {
            speed = Math.floor(speed * (1 + spdBonus / 100));
        }
    }
    return speed;
}

// ========== FLOATING DAMAGE EFFECT (from map.html) ==========
function showFloatingDamage(damage, spriteElement, isCritical = false, isHeal = false, isMiss = false) {
    if (!spriteElement || !document.body.contains(spriteElement)) return;
    
    const battleArea = document.getElementById('battle-screen');
    if (!battleArea || battleArea.classList.contains('hidden')) return;
    
    const rect = spriteElement.getBoundingClientRect();
    const battleRect = battleArea.getBoundingClientRect();
    
    const damageDiv = document.createElement('div');
    damageDiv.className = 'floating-damage';
    
    if (isCritical) damageDiv.classList.add('critical');
    if (isHeal) damageDiv.classList.add('heal');
    if (isMiss) damageDiv.classList.add('miss');
    
    let displayText = '';
    if (isMiss) {
        displayText = 'MISS!';
    } else if (isHeal) {
        displayText = `+${damage}`;
    } else {
        displayText = `${damage}`;
    }
    
    damageDiv.textContent = displayText;
    
    // Position relative to the sprite
    damageDiv.style.left = `${rect.left - battleRect.left + rect.width / 2 - 30}px`;
    damageDiv.style.top = `${rect.top - battleRect.top + rect.height / 2 - 40}px`;
    
    battleArea.appendChild(damageDiv);
    
    // Remove after animation completes
    setTimeout(() => {
        if (damageDiv && damageDiv.parentNode) damageDiv.remove();
    }, 800);
}

// ========== UTILITIES ==========
function typeColor(t) {
    const c={normal:'#A8A77A',fire:'#EE8130',water:'#6390F0',electric:'#F7D02C',grass:'#7AC74C',ice:'#96D9D6',fighting:'#C22E28',poison:'#A33EA1',ground:'#E2BF65',flying:'#A98FF3',psychic:'#F95587',bug:'#A6B91A',rock:'#B6A136',ghost:'#735797',dragon:'#6F35FC',dark:'#705746',steel:'#B7B7CE',fairy:'#D685AD'};
    return c[t]||'#777';
}

function getSpecialFormBonuses(pokemonName, pokemonId) {
    const name = pokemonName.toLowerCase();
    let atk = 0, def = 0, spd = 0;

    // Gigantamax / Dynamax
    if (name.includes('-gmax') || name === 'dynamax') {
        atk = 10; def = 10; spd = 10;
    }
    // Primal forms
    else if (name === 'kyogre-primal' || name === 'groudon-primal') {
        atk = 5; def = 5; spd = 5;
    }
    // Origin Forme
    else if (name === 'dialga-origin' || name === 'palkia-origin' || name === 'giratina-origin') {
        atk = 5; def = 3; spd = 3;
    }
    // Mega Evolutions
    else if (name.includes('-mega') || (pokemonId > 10000 && pokemonId < 10256)) {
        atk = 3; def = 3; spd = 3;
    }
    // Ultra Beasts
    else if ([793,794,795,796,797,798,799,803,804,805,806].includes(pokemonId) || name.includes('-ub')) {
        atk = 3; spd = 3;
    }
    // Alolan Forms
    else if (name === 'ninetales-alola' || name === 'alolan-ninetales') {
        spd = 2;
    }
    // Galarian Forms
    else if (name === 'darmanitan-galar-zen' || name.includes('galarian-darmanitan-zen')) {
        atk = 5;
    }
    // Hisuian Forms
    else if (name === 'zoroark-hisui' || name === 'hisuian-zoroark') {
        atk = 3; spd = 3;
    }
    // Deoxys forms
    else if (name === 'deoxys-attack') { atk = 5; spd = 5; }
    else if (name === 'deoxys-defense') { def = 5; }
    else if (name === 'deoxys-speed') { spd = 5; }
    // Zacian/Zamazenta Crowned
    else if (name === 'zacian-crowned') { atk = 5; spd = 3; }
    else if (name === 'zamazenta-crowned') { def = 5; spd = 3; }
    // Eternatus Eternamax
    else if (name === 'eternatus-eternamax') { atk = 5; def = 5; spd = 5; }
    // Zygarde forms
    else if (name === 'zygarde-50') { atk = 2; def = 2; spd = 2; }
    else if (name === 'zygarde-complete') { atk = 5; def = 5; spd = 5; }
    
    return { atk, def, spd };
}

function typeBadges(types) { return (types||[]).map(t=>`<span class="type-badge" style="background:${typeColor(t)}">${t.toUpperCase()}</span>`).join(''); }
function getBattleSpriteUrl(id, side='front') {
    const base = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown`;
    if(side==='back') return [`${base}/back/${id}.gif`, `${base}/${id}.gif`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${id}.png`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`];
    else return [`${base}/${id}.gif`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`];
}
function getShinyBattleSpriteUrl(pokemonName, id, side='front') {
    const name = pokemonName.toLowerCase();
    const officialShiny = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`;
    if(side==='back') return [`https://play.pokemonshowdown.com/sprites/ani-back-shiny/${name}.gif`, officialShiny, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/shiny/${id}.png`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`];
    else return [`https://play.pokemonshowdown.com/sprites/ani-shiny/${name}.gif`, officialShiny, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/shiny/${id}.gif`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`];
}
function loadImageWithFallback(img, urls) {
    let i=0;
    function next() { if(i>=urls.length) return; img.src=urls[i]; img.onerror=()=>{ i++; next(); }; }
    next();
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function toast(msg, type=''){ const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function closeModal(id){ document.getElementById(id)?.classList.add('hidden'); }
window.closeModal = closeModal;

async function getPokemonName(id) {
    if (pokemonNameCache.has(id)) return pokemonNameCache.get(id);
    try {
        const data = await fetchPokemon(id);
        pokemonNameCache.set(id, data.name);
        return data.name;
    } catch (e) {
        return `pokemon/${id}`;
    }
}

// PokeAPI cache
const POKE_CACHE = new Map();
async function cachedFetch(url){ if(POKE_CACHE.has(url)) return POKE_CACHE.get(url); const res=await fetch(url); if(!res.ok) throw new Error('fetch failed'); const data=await res.json(); POKE_CACHE.set(url,data); return data; }
async function fetchPokemon(id){ return cachedFetch(`https://pokeapi.co/api/v2/pokemon/${id}`); }
async function getMoveDetails(moves){ return Promise.all(moves.slice(0,4).map(async m=>{ try{ const d=await cachedFetch(m.move.url); return { name:d.name, power:d.power||40, type:d.type.name, accuracy:d.accuracy||100 }; }catch(e){ return { name:'tackle', power:40, type:'normal', accuracy:100 }; } })); }

async function loadMoveDatabase() { 
    if(moveDatabase.length) return; 
    
    // Check localStorage cache first (7 days expiry)
    const CACHE_KEY = 'pokesim_full_move_db_v2';
    try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            const { data, timestamp } = JSON.parse(cached);
            if ((Date.now() - timestamp) < 7 * 86400000) {
                moveDatabase = data;
                console.log(`Loaded ${moveDatabase.length} moves from cache`);
                return;
            }
        }
    } catch(e) {}
    
    try { 
        console.log("Fetching all moves from PokeAPI...");
        
        // Get total count first
        const listRes = await fetch('https://pokeapi.co/api/v2/move?limit=0&offset=0');
        const listData = await listRes.json();
        const totalMoves = listData.count;
        console.log(`Total moves available: ${totalMoves}`);
        
        // Fetch in batches of 100 to avoid rate limiting
        const limit = 100;
        const totalPages = Math.ceil(totalMoves / limit);
        const allMoves = [];
        
        for (let page = 0; page < totalPages; page++) {
            const offset = page * limit;
            const res = await fetch(`https://pokeapi.co/api/v2/move?limit=${limit}&offset=${offset}`);
            const data = await res.json();
            
            // Process moves in this batch (fetch details in parallel)
            const batchResults = await Promise.all(
                data.results.map(async (move) => {
                    try {
                        const detail = await cachedFetch(move.url);
                        // Include moves that have power > 0 (includes Z-Moves, Max Moves, etc.)
                        // Also include moves with power null but special effect (like status moves)
                        // But for battle we need damaging moves, so keep power > 0
                        if (detail.power && detail.power > 0) {
                            return {
                                name: detail.name,
                                type: detail.type.name,
                                power: detail.power,
                                accuracy: detail.accuracy || 100,
                                // Store additional info for special moves
                                isZMove: detail.name.includes('-z') || detail.name.includes('-z-'),
                                isMaxMove: detail.name.includes('-max') || detail.name.includes('max-'),
                                isGMaxMove: detail.name.includes('-gmax')
                            };
                        }
                        return null;
                    } catch(e) {
                        console.warn(`Failed to load move: ${move.name}`, e);
                        return null;
                    }
                })
            );
            
            const validMoves = batchResults.filter(m => m !== null);
            allMoves.push(...validMoves);
            console.log(`Loaded ${allMoves.length} moves so far...`);
        }
        
        moveDatabase = allMoves;
        console.log(`✅ Loaded ${moveDatabase.length} damaging moves (including Z-Moves and Max Moves)`);
        
        // Cache to localStorage
        try {
            localStorage.setItem(CACHE_KEY, JSON.stringify({ data: moveDatabase, timestamp: Date.now() }));
        } catch(e) {
            console.warn("Could not cache moves (localStorage may be full)");
        }
    } catch(e) { 
        console.error('Failed to load move database:', e);
        // Fallback moves if API fails
        moveDatabase = [
            { name: 'tackle', type: 'normal', power: 40, accuracy: 100 },
            { name: 'scratch', type: 'normal', power: 40, accuracy: 100 },
            { name: 'ember', type: 'fire', power: 40, accuracy: 100 },
            { name: 'water-gun', type: 'water', power: 40, accuracy: 100 },
            { name: 'thunder-shock', type: 'electric', power: 40, accuracy: 100 },
            { name: 'vine-whip', type: 'grass', power: 45, accuracy: 100 },
            { name: 'quick-attack', type: 'normal', power: 40, accuracy: 100 },
            { name: 'bite', type: 'dark', power: 60, accuracy: 100 }
        ];
    } 
}

async function getUserTeam(){ const snap=await getDocs(collection(db,'users',currentUser.uid,'pokemon')); const team=[]; snap.forEach(d=>{ const p=d.data(); if(p.inTeam) team.push({ id:d.id, pokemonId:p.pokemonId, name:p.name, level:p.level, exp:p.exp||0, moves:p.moves, types:p.types, bonusStats:p.bonusStats||{}, isShiny:p.isShiny||false, maxHp: Math.floor((p.level*25)*(p.isShiny?1.15:1)), currentHp: Math.floor((p.level*25)*(p.isShiny?1.15:1)) }); }); return team; }

async function updateNav(){ if(!currentUser) return; const snap=await getDoc(doc(db,'users',currentUser.uid)); if(snap.exists()) userData=snap.data(); document.getElementById('trainer-name').innerText=userData?.trainerName||'Trainer'; document.getElementById('trainer-level').innerText=userData?.totalLevels||0; document.getElementById('coin-amount').innerText=(userData?.coins||0).toLocaleString(); isAdmin=userData?.role==='admin'; document.getElementById('admin-toolbar').classList.toggle('hidden',!isAdmin); }

async function resetRaidBoss(raidId) {
    if (!confirm('⚠️ WARNING: This will reset ALL player damage and attempts for this boss! This action cannot be undone. Are you sure?')) return;
    try {
        const participantsQuery = query(collection(db, 'raid_participants'), where('raidId', '==', raidId));
        const participantsSnap = await getDocs(participantsQuery);
        const batch = writeBatch(db);
        participantsSnap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        toast(`✅ Reset complete! All player data for this boss has been cleared.`, 'success');
        loadRaids();
    } catch (error) {
        console.error('Reset error:', error);
        toast('❌ Failed to reset boss data', 'error');
    }
}

// ---------- RAID UI ----------
function loadRaids(){ 
    if(raidsUnsub) raidsUnsub(); 
    
    // For admins: show ALL raids (active + inactive)
    // For players: only show active raids
    let q;
    if (isAdmin) {
        q = query(collection(db, 'raid_bosses')); // Show all
    } else {
        q = query(collection(db, 'raid_bosses'), where('isActive', '==', true));
    }
    
    raidsUnsub = onSnapshot(q, async (snap)=>{ 
        const raids=[]; 
        for(const docSnap of snap.docs){ 
            const boss={ id:docSnap.id, ...docSnap.data() }; 
            if(currentUser){ 
                const partRef=doc(db,'raid_participants',`${boss.id}_${currentUser.uid}`); 
                const partSnap=await getDoc(partRef); 
                boss.userDamage=partSnap.exists()?partSnap.data().totalDamage||0:0; 
                boss.attemptsLeft = Math.max(0, 5 - (partSnap.exists()?partSnap.data().attemptsUsed||0:0)); 
            } else { 
                boss.userDamage=0; 
                boss.attemptsLeft=0; 
            } 
            raids.push(boss); 
        } 
        renderRaidList(raids); 
    }); 
}

        return; 
    }
    
    container.innerHTML=raids.map(raid => {
        const isActive = raid.isActive !== false; // default to true if not set
        let effectDisplay = '';
        let effectClass = '';
        
        if (raid.effect && raid.effect !== 'none') {
            const effectMap = {
                'legendary': { display: '✨ LEGENDARY', class: 'effect-legendary' },
                'void': { display: '🌑 VOID', class: 'effect-void' },
                'cosmic': { display: '🌌 COSMIC', class: 'effect-cosmic' },
                'blaze': { display: '🔥 BLAZE', class: 'effect-blaze' }
            };
            const mapped = effectMap[raid.effect];
            if (mapped) {
                effectDisplay = mapped.display;
                effectClass = mapped.class;
            }
        }
        
        return `<div class="raid-card ${!isActive ? 'inactive-raid' : ''}" data-id="${raid.id}" style="${!isActive ? 'opacity: 0.7; border-color: var(--danger);' : ''}">
            <div class="raid-banner" style="position: relative;">
                ${!isActive ? `<div class="inactive-badge" style="position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; z-index: 10;">⛔ INACTIVE</div>` : ''}

                    ${effectDisplay ? `<div class="effect-badge" style="position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); color: #ffd700; font-size: 0.65rem; padding: 3px 12px; border-radius: 20px; white-space: nowrap; font-weight: bold; border: 1px solid rgba(255,215,0,0.6);">${effectDisplay}</div>` : ''}

                <div style="font-size:0.7rem; margin-top: 4px;"><i class="fas fa-chart-line"></i> Lv. ${raid.level || 70}</div>
                ${raid.isShiny ? '<div style="font-size:0.65rem; margin-top: 2px;"><span style="background: #ffd700; color: #333; padding: 2px 8px; border-radius: 20px;">✨ SHINY ✨</span></div>' : ''}
            </div>

                <div class="raid-damage"><i class="fas fa-bolt"></i> Your dmg: ${(raid.userDamage || 0).toLocaleString()}</div>
                <div><br></div>
                <div class="raid-attempts"><i class="fas fa-fist-raised"></i> Attempts left: ${raid.attemptsLeft}/5</div>
            </div>
            <div id="leaderboard-${raid.id}" class="leaderboard-preview">Loading rankings...</div>
            <div style="padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn btn-primary btn-sm view-leaderboard" data-id="${raid.id}">🏆 Leaderboard</button>
                <button class="btn btn-gold btn-sm raid-battle-btn" data-id="${raid.id}" ${raid.attemptsLeft===0 || !isActive ? 'disabled' : ''}>⚔️ Battle</button>
                ${isAdmin ? `
                <button class="btn btn-outline btn-sm edit-boss-btn" data-id="${raid.id}">✏️ Edit</button>
                <button class="btn btn-danger btn-sm delete-boss-btn" data-id="${raid.id}">🗑️ Delete</button>

                if (raidSnap.exists()) openBossModal({ id: raidSnap.id, ...raidSnap.data() });

            };
        });
        
        document.querySelectorAll('.delete-boss-btn').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const raidId = btn.dataset.id;

                    await deleteDoc(doc(db, 'raid_bosses', raidId));
                    toast('Raid boss deleted', 'success');
                    loadRaids();
                }
            };
        });
        
        document.querySelectorAll('.reset-boss-btn').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                await resetRaidBoss(btn.dataset.id);
            };
        });
        
        // NEW: Toggle active status button
        document.querySelectorAll('.toggle-active-btn').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const raidId = btn.dataset.id;
                const currentActive = btn.dataset.active === 'true';
                const newActive = !currentActive;
                
                if (confirm(`${currentActive ? 'Deactivate' : 'Activate'} this raid boss? ${currentActive ? 'Players will no longer see or battle this boss.' : 'Players will be able to see and battle this boss.'}`)) {
                    await updateDoc(doc(db, 'raid_bosses', raidId), { isActive: newActive });
                    toast(`Raid boss ${newActive ? 'activated' : 'deactivated'}!`, 'success');
                    loadRaids();
                }
            };
        });
    }
}

function attachLeaderboardPreview(raidId){ 
    if(leaderboardUnsubs.has(raidId)) leaderboardUnsubs.get(raidId)(); 
    const q=query(collection(db,'raid_participants'), where('raidId','==',raidId), orderBy('totalDamage','desc'), limit(5)); 
    const unsub=onSnapshot(q, (snap)=>{ 
        const container=document.getElementById(`leaderboard-${raidId}`); 
        if(!container) return; 
        let html='<div style="font-weight:700; margin-bottom:6px;">🏅 Top Damage</div>'; 
        let rank=1; 
        snap.forEach(doc=>{ 
            const data=doc.data(); 
            html+=`<div class="leaderboard-item"><span>${rank}. ${escapeHtml(data.trainerName||'??')}</span><span>${data.totalDamage.toLocaleString()}</span></div>`; 
            rank++; 
        }); 
        if(rank===1) html+='<div class="leaderboard-item">No data yet</div>'; 
        container.innerHTML=html; 
    }); 
    leaderboardUnsubs.set(raidId,unsub); 
}

async function showFullLeaderboard(raidId){ 
    const snap=await getDocs(query(collection(db,'raid_participants'), where('raidId','==',raidId), orderBy('totalDamage','desc'), limit(100))); 
    let html='<div style="display:flex; flex-direction:column; gap:8px;">'; 
    let rank=1; 
    snap.forEach(d=>{ 
        html+=`<div class="leaderboard-item">${rank}. ${escapeHtml(d.data().trainerName)} — ${d.data().totalDamage.toLocaleString()} damage</div>`; 
        rank++; 
    }); 
    if(rank===1) html+='<div>No participants yet.</div>'; 
    html+='</div>'; 
    document.getElementById('leaderboard-full-list').innerHTML=html; 
    document.getElementById('leaderboard-modal').classList.remove('hidden'); 
}

    const partRef=doc(db,'raid_participants',`${raidId}_${currentUser.uid}`);

const typeEffectiveness = { normal:{rock:0.5,ghost:0,steel:0.5}, fire:{fire:0.5,water:0.5,grass:2,ice:2,bug:2,rock:0.5,dragon:0.5,steel:2}, water:{fire:2,water:0.5,grass:0.5,ground:2,rock:2,dragon:0.5}, electric:{water:2,electric:0.5,grass:0.5,ground:0,flying:2,dragon:0.5}, grass:{fire:0.5,water:2,grass:0.5,poison:0.5,ground:2,flying:0.5,bug:0.5,rock:2,dragon:0.5,steel:0.5}, ice:{fire:0.5,water:0.5,grass:2,ice:0.5,ground:2,flying:2,dragon:2,steel:0.5}, fighting:{normal:2,ice:2,rock:2,dark:2,steel:2,poison:0.5,flying:0.5,psychic:0.5,bug:0.5,ghost:0,fairy:0.5}, poison:{grass:2,fairy:2,poison:0.5,ground:0.5,rock:0.5,ghost:0.5,steel:0}, ground:{fire:2,electric:2,poison:2,rock:2,steel:2,grass:0.5,bug:0.5,flying:0}, flying:{grass:2,fighting:2,bug:2,electric:0.5,rock:0.5,steel:0.5}, psychic:{fighting:2,poison:2,psychic:0.5,dark:0,steel:0.5}, bug:{grass:2,psychic:2,dark:2,fire:0.5,fighting:0.5,poison:0.5,flying:0.5,ghost:0.5,steel:0.5,fairy:0.5}, rock:{fire:2,ice:2,flying:2,bug:2,fighting:0.5,ground:0.5,steel:0.5}, ghost:{psychic:2,ghost:2,normal:0,dark:0.5}, dragon:{dragon:2,steel:0.5,fairy:0}, dark:{fighting:0.5,psychic:2,ghost:2,dark:0.5,fairy:0.5}, steel:{ice:2,rock:2,fairy:2,fire:0.5,water:0.5,electric:0.5,steel:0.5}, fairy:{fighting:2,dragon:2,dark:2,fire:0.5,poison:0.5,steel:0.5} };
function getTypeEffectiveness(atk, def){ let m=1; for(let d of def) if(typeEffectiveness[atk] && typeEffectiveness[atk][d]) m*=typeEffectiveness[atk][d]; return m; }

function executeRaidAttack(attacker, defender, move, isPlayerAttacking) {
    // Get type effectiveness
    let eff = getTypeEffectiveness(move.type, defender.types);
    let effText = eff === 2 ? 'Super effective!' : (eff === 0.5 ? 'Not very effective...' : (eff === 0 ? 'No effect' : ''));
    let isCritical = eff === 2;
    
    // Calculate base damage
    let dmg = Math.floor((move.power / 5) * (attacker.level / 2) * eff);
    if (dmg < 1 && eff > 0) dmg = 1;
    
    // ========== STAB (Same Type Attack Bonus) ==========
    let stab = 1;
    if (attacker.types && attacker.types.includes(move.type)) {
        stab = 1.5;
        addBattleLog(`✨ STAB: ${move.type.toUpperCase()} move matches ${attacker.name.toUpperCase()}'s type!`);
    }
    dmg = Math.floor(dmg * stab);
    
    // ========== WILD BONUSES ==========
    if (attacker.bonusStats?.atk) {
        dmg = Math.floor(dmg * 1.25);
        addBattleLog(`⚔️ Wild ATK bonus: +25% damage!`);
    }
    if (defender.bonusStats?.def) {
        dmg = Math.floor(dmg * 0.75);
        addBattleLog(`🛡️ Wild DEF bonus: -25% damage taken!`);
    }
    
    // ========== FORM BONUSES ==========
    const formBonuses = getSpecialFormBonuses(attacker.name, attacker.pokemonId);
    if (formBonuses.atk > 0) {
        dmg = Math.floor(dmg * (1 + formBonuses.atk / 100));
        addBattleLog(`✨ Form bonus: +${formBonuses.atk}% damage!`);
    }
    
    const defenderFormBonuses = getSpecialFormBonuses(defender.name, defender.pokemonId);
    if (defenderFormBonuses.def > 0) {
        dmg = Math.floor(dmg * (1 - defenderFormBonuses.def / 100));
        addBattleLog(`🛡️ Form defense: -${defenderFormBonuses.def}% damage taken!`);
    }
    
    // ========== BADGE EFFECTS ==========
    if (isPlayerAttacking) {
        const atkBonus = getTotalBadgeBonus('atk', move.type);
        if (atkBonus > 0) {
            dmg = Math.floor(dmg * (1 + atkBonus / 100));
            addBattleLog(`⚔️ Badge boost: +${atkBonus}% damage (${move.type})!`);
        }
        const universalAtkBonus = getTotalBadgeBonus('atk', '');
        if (universalAtkBonus > 0 && atkBonus === 0) {
            dmg = Math.floor(dmg * (1 + universalAtkBonus / 100));
            addBattleLog(`⚔️ Badge boost: +${universalAtkBonus}% damage (all types)!`);
        }
    } else {
        const defBonus = getTotalBadgeBonus('def', move.type);
        if (defBonus > 0) {
            dmg = Math.floor(dmg * (1 - defBonus / 100));
            addBattleLog(`🛡️ Badge protection: -${defBonus}% damage from ${move.type} moves!`);
        }
    }
    
    // Apply damage
    const oldHp = defender.currentHp;
    defender.currentHp = Math.max(0, Math.floor(defender.currentHp - dmg));
    const actualDamage = oldHp - defender.currentHp;
    
    // ========== SHOW FLOATING DAMAGE ON SPRITE ==========
    const targetSprite = isPlayerAttacking ? document.getElementById('e-sprite-btl') : document.getElementById('p-sprite-btl');
    if (actualDamage > 0) {
        showFloatingDamage(actualDamage, targetSprite, isCritical, false, false);
    } else if (eff === 0) {
        showFloatingDamage(0, targetSprite, false, false, true);
    }
    
    // Log the attack
    if (isPlayerAttacking) {
        updateRaidDamage(actualDamage);
        addBattleLog(`${attacker.name.toUpperCase()} used ${move.name.toUpperCase()}! Deals ${actualDamage} dmg! ${effText} (+${actualDamage} raid dmg)`);
    } else {
        addBattleLog(`${attacker.name.toUpperCase()} used ${move.name.toUpperCase()}! Deals ${actualDamage} dmg! ${effText}`);
    }
    
    // Shake effect on hit
    if (targetSprite) {
        targetSprite.classList.remove('shake-effect');
        void targetSprite.offsetWidth; // Force reflow
        targetSprite.classList.add('shake-effect');
        setTimeout(() => {
            if (targetSprite) targetSprite.classList.remove('shake-effect');
        }, 500);
    }
    
    // Faint check
    if (defender.currentHp <= 0) {
        addBattleLog(`💀 ${defender.name.toUpperCase()} has fainted! 💀`);
        if (targetSprite) {
            targetSprite.style.transition = 'opacity 0.5s';
            targetSprite.style.opacity = '0.5';
            setTimeout(() => {
                if (targetSprite) targetSprite.style.opacity = '1';
            }, 500);
        }
    }
    
    return defender.currentHp <= 0;
}


async function runRaidTurn(selectedMove){ 
    if(battleProcessing) return; 
    
    // ========== ADD CONCENTRATING MESSAGE ==========
    addBattleLog(`🧠 ${currentRaidBattle.playerTeam[currentRaidBattle.activePlayerIdx].name.toUpperCase()} is concentrating...`);
    
    battleProcessing=true; 
    toggleBattleUI(true);
    if(currentTurnTimeout) clearTimeout(currentTurnTimeout);
    
    currentTurnTimeout=setTimeout(async ()=>{
        if(!currentRaidBattle){ battleProcessing=false; toggleBattleUI(false); return; }
        const b=currentRaidBattle;
        const player=b.playerTeam[b.activePlayerIdx];
        const bossData=b.bossData;
        const fakeBoss={ name:bossData.customName||bossData.name, types:bossData.types, level:bossData.level||70, currentHp:99999, maxHp:99999, moves:bossData.moves||[], bonusStats:bossData.bonusStats||{} };
        
        // Calculate speed to determine who attacks first
        const playerSpeed = getEffectiveSpeedWithBadges(player, true);
        const bossSpeed = getEffectiveSpeedWithBadges(fakeBoss, false);
        let firstAttacker;
        if (playerSpeed > bossSpeed) {
            firstAttacker = 'player';
        } else if (bossSpeed > playerSpeed) {
            firstAttacker = 'boss';
        } else {
            firstAttacker = Math.random() < 0.5 ? 'player' : 'boss';
        }
        addBattleLog(`⚡ Speed: ${player.name} (${playerSpeed}) vs ${fakeBoss.name} (${bossSpeed}) - ${firstAttacker.toUpperCase()} attacks first!`);
        
        if(firstAttacker==='player'){
            const bossFaint=executeRaidAttack(player,fakeBoss,selectedMove,true);
            renderBattleUI();
            if(bossFaint===false) setTimeout(async ()=>{
    if(!currentRaidBattle) return;
    addBattleLog(`⚔️ The boss prepares to counterattack! ⚔️`);
    await new Promise(resolve => setTimeout(resolve, 500));
    const randomMove=fakeBoss.moves[Math.floor(Math.random()*fakeBoss.moves.length)];
    const playerFaint=executeRaidAttack(fakeBoss,player,randomMove,false);
    renderBattleUI();
    if(playerFaint) await handlePlayerFaint();
    else { battleProcessing=false; toggleBattleUI(false); currentTurnTimeout=null; }
},1000);
            else { battleProcessing=false; toggleBattleUI(false); currentTurnTimeout=null; }
        } else {
            const randomMove=fakeBoss.moves[Math.floor(Math.random()*fakeBoss.moves.length)];
            const playerFaint=executeRaidAttack(fakeBoss,player,randomMove,false);
            renderBattleUI();
            if(playerFaint) { await handlePlayerFaint(); battleProcessing=false; toggleBattleUI(false); return; }
            setTimeout(async ()=>{
                if(!currentRaidBattle) return;
                const bossFaint=executeRaidAttack(player,fakeBoss,selectedMove,true);
                renderBattleUI();
                battleProcessing=false; toggleBattleUI(false);
                currentTurnTimeout=null;
            },1000);
        }
    }, 2500);
}

async function handlePlayerFaint() {
    if (!currentRaidBattle) return;
    const b = currentRaidBattle;
    const faintedPokemon = b.playerTeam[b.activePlayerIdx];
    const faintedId = faintedPokemon.id;
    
    addBattleLog(`💀 ${faintedPokemon.name.toUpperCase()} has fainted! 💀`);
    
    // Add delay to let player see the faint message
    await new Promise(resolve => setTimeout(resolve, 1500));
    
    const available = b.playerTeam.filter(p => p.currentHp > 0 && p.id !== faintedId);
    if (available.length === 0) {
        addBattleLog("❌ All your Pokémon have fainted! You retreat from the raid. ❌");
        await new Promise(resolve => setTimeout(resolve, 1500));
        await endRaidBattle(false);
        return;
    }
    
    addBattleLog(`🔄 Choose your next Pokémon to send out!`);
    
    // Show switch modal with a slight delay
    await new Promise(resolve => setTimeout(resolve, 500));
    
    toggleBattleUI(true);
    battleProcessing = true;
    
    const selected = await showSwitchModal(available, faintedId);
    if (!selected) {
        addBattleLog("No Pokémon sent out. Retreating...");
        await new Promise(resolve => setTimeout(resolve, 1000));
        await endRaidBattle(false);
        return;
    }
    
    const newIdx = b.playerTeam.findIndex(p => p.id === selected.id);
    b.activePlayerIdx = newIdx;
    renderBattleUI();
    addBattleLog(`✨ Go! ${b.playerTeam[newIdx].name.toUpperCase()}! ✨`);

async function endRaidBattle(isVictory){ 
    if(!currentRaidBattle) return;
    if(currentTurnTimeout) clearTimeout(currentTurnTimeout);
    const b=currentRaidBattle;
    const partRef=doc(db,'raid_participants',`${b.raidId}_${currentUser.uid}`);
    await runTransaction(db,async (tx)=>{ 
        const snap=await tx.get(partRef); 
        let attemptsUsed=snap.exists()?snap.data().attemptsUsed||0:0; 
        if(attemptsUsed<5) tx.update(partRef,{ attemptsUsed:increment(1), lastAttempt:new Date() }); 
        else throw new Error('attempt limit'); 
    });
    addBattleLog(`Battle ended! Your total damage: ${b.totalDamageAcc.toLocaleString()}. Attempt used.`);
    hideBattleScreen();
    loadRaids(); 
    updateNav(); 
}

async function startRaidBattle(raidId){ 
    if(!currentUser) return; 
    const bossSnap=await getDoc(doc(db,'raid_bosses',raidId)); 
    if(!bossSnap.exists()||!bossSnap.data().isActive){ toast('Raid not active','error'); return; }
    const partRef=doc(db,'raid_participants',`${raidId}_${currentUser.uid}`); 
    const partSnap=await getDoc(partRef); 
    let attemptsUsed=partSnap.exists()?partSnap.data().attemptsUsed||0:0; 
    if(attemptsUsed>=5){ toast('No attempts left for this boss','error'); return; }
    const team=await getUserTeam(); 
    if(team.length===0){ toast('You have no Pokémon in team','error'); return; }
    const boss=bossSnap.data();
    const selected = await showPreBattleSelectModal(team);
    if(!selected) return;
    const activeIdx=team.findIndex(p=>p.id===selected.id);
    team[activeIdx].currentHp=team[activeIdx].maxHp;
    let totalDamageThisAttempt=0;
    if(partSnap.exists()) totalDamageThisAttempt=partSnap.data().totalDamage||0;
    currentRaidBattle={ raidId, bossData:boss, playerTeam:team, activePlayerIdx:activeIdx, totalDamageAcc:totalDamageThisAttempt, attemptDamageDelta:0 };
    if(!partSnap.exists()) await setDoc(partRef,{ raidId, userId:currentUser.uid, trainerName:userData?.trainerName||'Trainer', totalDamage:0, attemptsUsed:0, updatedAt:serverTimestamp() });
    showBattleScreen();
    renderBattleUI();
    addBattleLog(`⚔️ RAID BATTLE: ${boss.customName||boss.name} ⚔️`);
    addBattleLog(`Each attack adds to global damage!`);
}

    const b = currentRaidBattle;
    const current = b.playerTeam[b.activePlayerIdx];
    const available = b.playerTeam.filter(p => p.currentHp > 0 && p.id !== current.id);

    if (bonusStats?.def) bonusHtml += '<span class="bonus-pill def" style="background:#4dabf7; padding:2px 8px; border-radius:20px; font-size:0.6rem;">🛡️ +25% DEF</span>';
    if (bonusStats?.spd) bonusHtml += '<span class="bonus-pill spd" style="background:#69db7c; padding:2px 8px; border-radius:20px; font-size:0.6rem;">🏃 +25% SPD</span>';
    
    container.innerHTML = `
        <div style="background: linear-gradient(135deg, #2d3748, #1a202c); border-radius: 16px; padding: 12px; margin-top: 10px;">
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <div style="position: relative;">
                    <img src="${showdownUrl}" onerror="this.src='${officialUrl}'" style="width: 80px; height: 80px; object-fit: contain;">
                    ${isShiny ? '<div style="position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #333; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; white-space: nowrap;">✨ SHINY</div>' : ''}
                </div>
                <div style="flex: 1;">
                    <div style="font-weight: 800; font-size: 1rem;">${pokemon.name.toUpperCase()} ${bonusHtml}</div>
                    <div style="margin: 4px 0;">${typeBadges(pokemon.types.map(t => t.type.name))}</div>
                    <div style="font-size: 0.7rem; color: var(--text-light);">Level: ${level || 50}</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;">
                        ${(pokemon.moves || []).slice(0, 4).map(m => `
                            <span class="move-badge" style="background: ${typeColor(m.type?.name || 'normal')}; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem;">${(m.move?.name || m.name || 'tackle').toUpperCase()}</span>
                        `).join('')}
                    </div>
                </div>
            </div>
        </div>
    `;
}

function renderRewardTiers() {
    const container = document.getElementById('reward-tiers-container');
    if (!container) return;
    
    if (rewardTiers.length === 0) {
        container.innerHTML = '<div style="color: var(--text-light); font-size: 0.8rem; padding: 8px; text-align: center;">No rewards configured. Click + to add.</div>';
        return;
    }
    
    container.innerHTML = rewardTiers.map((tier, idx) => {
        const isPokemon = tier.rewardType === 'pokemon';
        return `
            <div class="reward-tier-card" data-idx="${idx}" style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 12px; margin-bottom: 12px;">
                <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px;">
                    <select class="reward-rank" data-idx="${idx}" style="width: 110px; padding: 6px 10px;">
                        <option ${tier.rank === '1st' ? 'selected' : ''}>1st</option>
                        <option ${tier.rank === '2nd' ? 'selected' : ''}>2nd</option>
                        <option ${tier.rank === '3rd' ? 'selected' : ''}>3rd</option>
                        <option ${tier.rank === '4th' ? 'selected' : ''}>4th</option>
                        <option ${tier.rank === '5th' ? 'selected' : ''}>5th</option>
                        <option ${tier.rank === 'participation' ? 'selected' : ''}>participation</option>
                    </select>
                    <select class="reward-type" data-idx="${idx}" style="width: 120px; padding: 6px 10px;">
                        <option value="coins" ${tier.rewardType === 'coins' ? 'selected' : ''}>💰 Coins</option>
                        <option value="pokemon" ${tier.rewardType === 'pokemon' ? 'selected' : ''}>🎁 Pokémon</option>
                    </select>
                    <button class="remove-reward-btn btn btn-danger btn-sm" data-idx="${idx}" style="margin-left: auto;">✕ Remove</button>
                </div>
                
                ${isPokemon ? `
                    <div class="pokemon-reward-config" data-idx="${idx}">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label style="font-size: 0.7rem;">Pokémon ID or Name</label>
                                <div style="display: flex; gap: 6px;">
                                    <input type="text" class="reward-pokemon-search" data-idx="${idx}" placeholder="e.g., 25 or pikachu" style="flex: 2;" value="${tier.rewardId || ''}">
                                    <button class="btn btn-primary btn-sm load-reward-pokemon" data-idx="${idx}">Load</button>
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label style="font-size: 0.7rem;">Level</label>
                                <input type="number" class="reward-pokemon-level" data-idx="${idx}" value="${tier.rewardAmount || 50}" min="1" max="200">
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 12px;">
                            <label style="font-size: 0.7rem;">Bonus Stats</label>
                            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                                <label><input type="checkbox" class="reward-pokemon-atk" data-idx="${idx}" ${tier.bonusStats?.atk ? 'checked' : ''}> ⚔️ +25% ATK</label>
                                <label><input type="checkbox" class="reward-pokemon-def" data-idx="${idx}" ${tier.bonusStats?.def ? 'checked' : ''}> 🛡️ +25% DEF</label>
                                <label><input type="checkbox" class="reward-pokemon-spd" data-idx="${idx}" ${tier.bonusStats?.spd ? 'checked' : ''}> 🏃 +25% SPD</label>
                                <label><input type="checkbox" class="reward-pokemon-shiny" data-idx="${idx}" ${tier.isShiny ? 'checked' : ''}> ✨ Shiny</label>
                            </div>
                        </div>
                        <div class="reward-pokemon-preview" data-idx="${idx}" style="min-height: 120px;"></div>
                    </div>
                ` : `
                    <div class="coin-reward-config" data-idx="${idx}">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label style="font-size: 0.7rem;">Coin Amount</label>
                            <input type="number" class="reward-coin-amount" data-idx="${idx}" value="${tier.rewardAmount || 5000}" min="0" step="100">
                        </div>
                    </div>
                `}
            </div>
        `;
    }).join('');
    
    // Attach event listeners for dynamic content
    attachRewardEventListeners();
}

function attachRewardEventListeners() {
    // Rank change
    document.querySelectorAll('.reward-rank').forEach(select => {
        select.removeEventListener('change', handleRankChange);
        select.addEventListener('change', handleRankChange);
    });
    
    // Type change (coins/pokemon)
    document.querySelectorAll('.reward-type').forEach(select => {
        select.removeEventListener('change', handleTypeChange);
        select.addEventListener('change', handleTypeChange);
    });
    
    // Remove button
    document.querySelectorAll('.remove-reward-btn').forEach(btn => {
        btn.removeEventListener('click', handleRemoveReward);
        btn.addEventListener('click', handleRemoveReward);
    });
    
    // Coin amount
    document.querySelectorAll('.reward-coin-amount').forEach(input => {
        input.removeEventListener('change', handleCoinAmountChange);
        input.addEventListener('change', handleCoinAmountChange);
    });
    
    // Pokemon level
    document.querySelectorAll('.reward-pokemon-level').forEach(input => {
        input.removeEventListener('change', handlePokemonLevelChange);
        input.addEventListener('change', handlePokemonLevelChange);
    });
    
    // Pokemon bonus stats
    document.querySelectorAll('.reward-pokemon-atk, .reward-pokemon-def, .reward-pokemon-spd, .reward-pokemon-shiny').forEach(checkbox => {
        checkbox.removeEventListener('change', handlePokemonBonusChange);
        checkbox.addEventListener('change', handlePokemonBonusChange);
    });
    
    // Load Pokemon button
    document.querySelectorAll('.load-reward-pokemon').forEach(btn => {
        btn.removeEventListener('click', handleLoadPokemon);
        btn.addEventListener('click', handleLoadPokemon);
    });
    
    // Pokemon search input (live preview on enter)
    document.querySelectorAll('.reward-pokemon-search').forEach(input => {
        input.removeEventListener('keypress', handlePokemonSearchKeypress);
        input.addEventListener('keypress', handlePokemonSearchKeypress);
    });
}

function handleRankChange(e) {
    const idx = parseInt(e.target.dataset.idx);
    rewardTiers[idx].rank = e.target.value;
}

function handleTypeChange(e) {
    const idx = parseInt(e.target.dataset.idx);
    const newType = e.target.value;
    rewardTiers[idx].rewardType = newType;
    if (newType === 'coins') {
        rewardTiers[idx].rewardAmount = rewardTiers[idx].rewardAmount || 5000;
        delete rewardTiers[idx].pokemonData;
    } else {
        rewardTiers[idx].rewardAmount = rewardTiers[idx].rewardAmount || 50;
        rewardTiers[idx].bonusStats = rewardTiers[idx].bonusStats || { atk: false, def: false, spd: false };
    }
    renderRewardTiers();
}

function handleRemoveReward(e) {
    const idx = parseInt(e.target.closest('.remove-reward-btn').dataset.idx);
    rewardTiers.splice(idx, 1);
    renderRewardTiers();
}

function handleCoinAmountChange(e) {
    const idx = parseInt(e.target.dataset.idx);
    rewardTiers[idx].rewardAmount = parseInt(e.target.value) || 0;
}

function handlePokemonLevelChange(e) {
    const idx = parseInt(e.target.dataset.idx);
    rewardTiers[idx].rewardAmount = parseInt(e.target.value) || 50;
}

function handlePokemonBonusChange(e) {
    const idx = parseInt(e.target.dataset.idx);
    if (!rewardTiers[idx].bonusStats) rewardTiers[idx].bonusStats = { atk: false, def: false, spd: false };
    if (e.target.classList.contains('reward-pokemon-atk')) rewardTiers[idx].bonusStats.atk = e.target.checked;
    if (e.target.classList.contains('reward-pokemon-def')) rewardTiers[idx].bonusStats.def = e.target.checked;
    if (e.target.classList.contains('reward-pokemon-spd')) rewardTiers[idx].bonusStats.spd = e.target.checked;
    if (e.target.classList.contains('reward-pokemon-shiny')) rewardTiers[idx].isShiny = e.target.checked;
    
    // Update preview
    updateRewardPokemonPreview(idx);
}

async function handleLoadPokemon(e) {
    const idx = parseInt(e.target.dataset.idx);
    const searchInput = document.querySelector(`.reward-pokemon-search[data-idx="${idx}"]`);
    const searchValue = searchInput?.value.trim();
    
    if (!searchValue) {
        toast('Enter a Pokémon name or ID', 'error');
        return;
    }
    
    const pokemon = await fetchRewardPokemon(searchValue);
    if (pokemon) {
        rewardTiers[idx].rewardId = pokemon.id.toString();
        rewardTiers[idx].pokemonName = pokemon.name;
        rewardTiers[idx].pokemonData = pokemon;
        if (searchInput) searchInput.value = `${pokemon.name} (#${pokemon.id})`;
        await updateRewardPokemonPreview(idx);
        toast(`Loaded ${pokemon.name.toUpperCase()}`, 'success');
    } else {
        toast('Pokémon not found!', 'error');
    }
}

function handlePokemonSearchKeypress(e) {
    if (e.key === 'Enter') {
        const idx = parseInt(e.target.dataset.idx);
        const loadBtn = document.querySelector(`.load-reward-pokemon[data-idx="${idx}"]`);
        if (loadBtn) loadBtn.click();
    }
}

async function updateRewardPokemonPreview(idx) {
    const previewContainer = document.querySelector(`.reward-pokemon-preview[data-idx="${idx}"]`);
    if (!previewContainer) return;
    
    const tier = rewardTiers[idx];
    if (!tier.rewardId) {
        previewContainer.innerHTML = '<div style="text-align: center; color: var(--text-light); padding: 20px;">Enter a Pokémon ID or name and click Load</div>';
        return;
    }
    
    let pokemon = tier.pokemonData;
    if (!pokemon) {
        pokemon = await fetchRewardPokemon(parseInt(tier.rewardId));
        if (pokemon) tier.pokemonData = pokemon;
    }
    
    if (pokemon) {
        renderRewardPokemonPreview(
            previewContainer, 
            pokemon, 
            tier.isShiny || false, 
            tier.rewardAmount || 50, 
            tier.bonusStats || { atk: false, def: false, spd: false }
        );
    } else {
        previewContainer.innerHTML = '<div style="text-align: center; color: var(--danger); padding: 20px;">❌ Invalid Pokémon</div>';
    }
}

function addCoinReward() {
    rewardTiers.push({ 
        rank: 'participation', 
        rewardType: 'coins', 
        rewardId: null, 
        rewardAmount: 5000 
    });
    renderRewardTiers();
}

function addPokemonReward() {
    rewardTiers.push({ 
        rank: 'participation', 
        rewardType: 'pokemon', 
        rewardId: null, 
        rewardAmount: 50,
        bonusStats: { atk: false, def: false, spd: false },
        isShiny: false
    });
    renderRewardTiers();
}
    
    // Initialize
    if (existing?.rewardTiers) {
        rewardTiers = [...existing.rewardTiers];
    }
    
    // Set up event listeners
    document.getElementById('fetch-pokemon-btn').onclick = fetchPokemonByIdOrName;
    document.getElementById('boss-shiny').addEventListener('change', updatePokemonPreview);
    document.getElementById('boss-effect').addEventListener('change', updatePokemonPreview);
    
    // Initialize preview if existing
    if (existing?.speciesId) {
        currentSpeciesId = existing.speciesId;
        setTimeout(() => updatePokemonPreview(), 100);
    }
    
    renderMoveTable();
    updateSelectedMovesPreview();
    renderRewardTiers();
    
    document.getElementById('add-tier-btn').onclick = addCoinReward;
    document.getElementById('add-pokemon-reward-btn').onclick = addPokemonReward;
    
    // Save button
    document.getElementById('save-boss-btn').onclick = async () => {
        let speciesId = parseInt(document.getElementById('boss-species-id').value);
        if (!speciesId && document.getElementById('boss-species-name').value) {
            try {
                const pokemon = await fetchPokemon(document.getElementById('boss-species-name').value.toLowerCase());
                speciesId = pokemon.id;
                document.getElementById('boss-species-id').value = speciesId;
            } catch (e) {
                toast('Please enter a valid Pokémon ID or name', 'error');
                return;
            }
        }
        
        if (!speciesId || isNaN(speciesId)) {
            toast('Please enter a valid Pokémon ID or name', 'error');
            return;
        }
        
        const speciesData = await fetchPokemon(speciesId);
        const customName = document.getElementById('boss-custom-name').value.trim();
        const typeOverride = document.getElementById('boss-type-override').value.trim();
        let finalTypes = typeOverride ? typeOverride.split(',').map(s => s.trim()) : speciesData.types.map(t => t.type.name);
        const level = parseInt(document.getElementById('boss-level').value) || 70;
        const hpMultiplier = parseFloat(document.getElementById('boss-hp-mult').value) || 5;
        const effect = document.getElementById('boss-effect').value;
        const isShiny = document.getElementById('boss-shiny').checked;
        const isActive = document.getElementById('boss-active').checked;
        const bonusStats = {
            atk: document.getElementById('boss-atk').checked,
            def: document.getElementById('boss-def').checked,
            spd: document.getElementById('boss-spd').checked
        };
        
        const moves = selectedMoves.slice(0, 4);
        while (moves.length < 4) moves.push({ name: 'tackle', type: 'normal', power: 40 });
        
        const bossData = {
    speciesId, name: speciesData.name, customName: customName || speciesData.name,
    types: finalTypes, level, hpMultiplier, effect, isShiny, bonusStats, moves,
    isActive, 
    rewardTiers: rewardTiers,  // ← USE rewardTiers directly, NOT rewardTiersData
    updatedAt: serverTimestamp()
};
        
        if (existing?.id) await updateDoc(doc(db, 'raid_bosses', existing.id), bossData);
        else await addDoc(collection(db, 'raid_bosses'), bossData);
        
        closeModal('boss-modal');
        loadRaids();
        toast('Raid boss saved!', 'success');
    };
    
    document.getElementById('boss-modal').classList.remove('hidden');
}

document.getElementById('create-boss-btn').onclick=()=>openBossModal();
document.getElementById('distribute-rewards-btn').onclick=async()=>{ 
    if(!confirm('Distribute rewards based on current leaderboards?')) return; 
    const raidsSnap=await getDocs(collection(db,'raid_bosses')); 
    for(const raidDoc of raidsSnap.docs){ 
        const raid=raidDoc.data(); 
        if(!raid.isActive) continue; 
        const participantsSnap=await getDocs(query(collection(db,'raid_participants'), where('raidId','==',raidDoc.id), orderBy('totalDamage','desc'), limit(100))); 
        const list=[]; 
        participantsSnap.forEach(p=>list.push({id:p.id,data:p.data()})); 
        const rewardMap=new Map(); 
        for(const tier of raid.rewardTiers||[]){ 
            if(tier.rank==='1st' && list[0]) rewardMap.set(list[0].data.userId, tier); 
            else if(tier.rank==='2nd' && list[1]) rewardMap.set(list[1].data.userId, tier); 
            else if(tier.rank==='3rd' && list[2]) rewardMap.set(list[2].data.userId, tier); 
            else if(tier.rank==='4th' && list[3]) rewardMap.set(list[3].data.userId, tier); 
            else if(tier.rank==='5th' && list[4]) rewardMap.set(list[4].data.userId, tier); 
            else if(tier.rank==='participation') for(let i=5;i<list.length;i++) if(!rewardMap.has(list[i].data.userId)) rewardMap.set(list[i].data.userId, tier); 
        } 
        for(const [uid, tier] of rewardMap.entries()){ 
            if(tier.rewardType==='coins') await updateDoc(doc(db,'users',uid),{coins:increment(tier.rewardAmount)}); 
            else if(tier.rewardType==='pokemon' && tier.rewardId){ 
                const pokeId=parseInt(tier.rewardId); 
                if(pokeId){ 
                    const pData=await fetchPokemon(pokeId); 
                    const newPokemon={ pokemonId:pData.id, name:pData.name, level:tier.rewardAmount||50, exp:0, moves:pData.moves.slice(0,4).map(m=>({name:m.move.name,type:'normal',power:40})), types:pData.types.map(t=>t.type.name), inTeam:false, capturedAt:new Date(), bonusStats:{}, isShiny:false }; 
                    await addDoc(collection(db,'users',uid,'pokemon'), newPokemon); 
                } 
            } 
        } 
    } 


    toast('Rewards distributed!','success'); 
};

await loadUserBadgeEffects();

document.addEventListener('DOMContentLoaded', () => {
    const createBtn = document.getElementById('create-boss-btn');
    if (createBtn) createBtn.onclick = () => openBossModal();
    
    const distributeBtn = document.getElementById('distribute-rewards-btn');
    if (distributeBtn) {
        distributeBtn.onclick = async () => {
            if (!confirm('Distribute rewards based on current leaderboards?')) return;
            // ... rest of distribution code
        };
    }
    
    const themeBtn = document.getElementById('theme-toggle-btn');
    if (themeBtn) {
        themeBtn.onclick = () => { 
            document.body.classList.toggle('dark-theme'); 
            localStorage.setItem('darkRaid', document.body.classList.contains('dark-theme')); 
        };
    }
    
    const logout = document.getElementById('logout-btn');
    if (logout) logout.onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    
    const switchBtn = document.getElementById('switch-btn');
    if (switchBtn) {
        switchBtn.onclick = async () => {
            if(battleProcessing || !currentRaidBattle) return;
            const b = currentRaidBattle;
            const current = b.playerTeam[b.activePlayerIdx];
            const available = b.playerTeam.filter(p => p.currentHp > 0 && p.id !== current.id);
            if(available.length===0){ addBattleLog("No other Pokémon can switch!"); return; }
            battleProcessing = true;
            toggleBattleUI(true);
            const selected = await showSwitchModal(available, current.id);
            if(!selected) {
                const bossData = b.bossData;
                const fakeBoss = { name:bossData.customName||bossData.name, types:bossData.types, level:bossData.level||70, currentHp:99999, maxHp:99999, moves:bossData.moves||[], bonusStats:bossData.bonusStats||{} };
                const randomMove = fakeBoss.moves[Math.floor(Math.random()*fakeBoss.moves.length)];
                executeRaidAttack(fakeBoss, current, randomMove, false);
                renderBattleUI();
                if(current.currentHp <= 0) await handlePlayerFaint();
                else { battleProcessing=false; toggleBattleUI(false); }
                return;
            }
            const newIdx = b.playerTeam.findIndex(p => p.id === selected.id);
            b.activePlayerIdx = newIdx;
            renderBattleUI();
            addBattleLog(`Go! ${b.playerTeam[newIdx].name.toUpperCase()}!`);
            setTimeout(async ()=>{
                const bossData = b.bossData;
                const fakeBoss = { name:bossData.customName||bossData.name, types:bossData.types, level:bossData.level||70, currentHp:99999, maxHp:99999, moves:bossData.moves||[], bonusStats:bossData.bonusStats||{} };
                const randomMove = fakeBoss.moves[Math.floor(Math.random()*fakeBoss.moves.length)];
                executeRaidAttack(fakeBoss, b.playerTeam[newIdx], randomMove, false);
                renderBattleUI();
                if(b.playerTeam[newIdx].currentHp <= 0) await handlePlayerFaint();
                else { battleProcessing=false; toggleBattleUI(false); }
            }, 1000);
        };
    }
    
    const escapeBtn = document.getElementById('escape-btn');
    if (escapeBtn) escapeBtn.onclick = () => { if(currentRaidBattle && !battleProcessing) endRaidBattle(false); };
});
