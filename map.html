async function handlePlayerFaint(battle) {
    const available = [];
    const originalIndices = [];
    
    // Construct list of healthy backup Pokémon
    battle.playerTeam.forEach((p, idx) => {
        if (p.hp > 0) {
            available.push(p);
            originalIndices.push(idx);
        }
    });

    if (available.length === 0) return null;

    const selected = await showSwitchPokemonModal(available, originalIndices);
    
    // If selected is null (Cancel clicked), return null to trigger "Black out"
    if (!selected) return null;

    const newIdx = selected.originalIndex;
    battle.activePokemonIndex = newIdx;
    battle.player = battle.playerTeam[newIdx];

    renderBattleUI();
    addBattleLog(`Go! ${battle.player.name.toUpperCase()}!`);
    return newIdx;
}

        function updateCatchChance() {
            if (!currentBattle) return;
            const b = currentBattle;
            const btn = document.getElementById('catch-btn');
            if (b.player.level <= 10) {
                document.getElementById('catch-chance').innerHTML = "Catch requires Lv > 10";
                document.getElementById('catch-chance').style.color = "var(--danger)";
                if (btn) btn.disabled = true;
                return;
            }
            const expNeeded = b.player.level * 300;
            const prog = ((b.player.exp || 0) / expNeeded) * 100;
            if (prog < 20) {
                document.getElementById('catch-chance').innerHTML = "Catch requires ≥20% XP progress";
                document.getElementById('catch-chance').style.color = "var(--danger)";
                if (btn) btn.disabled = true;
                return;
            }
            const hpPct = b.wild.hp / b.wild.maxHp;
            let chance = (1 - hpPct) * 0.8 + 0.2;
            chance = Math.min(0.95, Math.max(0.1, chance));
            document.getElementById('catch-chance').innerHTML = `Catch chance: ${Math.floor(chance*100)}%`;
            document.getElementById('catch-chance').style.color = "";
            if (btn) btn.disabled = false;
        }
        async function attemptCatch() {
            if (!currentBattle || isProcessing) return;
            const b = currentBattle;
            const btn = document.getElementById('catch-btn');
            if (b.player.level <= 10) {
                alert("Active Pokémon must be above level 10 to attempt catching!");
                return;
            }
            const expNeeded = b.player.level * 300;
            const prog = ((b.player.exp || 0) / expNeeded) * 100;
            if (prog < 20) {
                alert("Your Pokémon needs at least 20% XP progress to attempt catching!");
                return;
            }
            isProcessing = true;
            if (btn) btn.disabled = true;
            const activeRef = doc(db, "users", auth.currentUser.uid, "pokemon", b.player.id);
            const activeSnap = await getDoc(activeRef);
            let fireExp = activeSnap.data().exp || 0;
            let penalty = Math.floor(fireExp * 0.2);
            let newExp = Math.max(0, fireExp - penalty);
            await updateDoc(activeRef, { exp: newExp });
            if (cachedActivePokemon && cachedActivePokemon.id === b.player.id) cachedActivePokemon.exp = newExp;
            addBattleLog(`Attempted to catch! Lost ${penalty} XP.`);
            const hpPct = b.wild.hp / b.wild.maxHp;
            let catchChance = (1 - hpPct) * 0.8 + 0.2;
            catchChance = Math.min(0.95, Math.max(0.1, catchChance));
            const success = Math.random() < catchChance;
            if (success) {
                addBattleLog(`Success! You caught ${b.wild.name.toUpperCase()}!`);
                const p = await fetch(`https://pokeapi.co/api/v2/pokemon/${b.wild.pokemonId}`).then(r=>r.json());
                const newPokemon = { pokemonId: b.wild.pokemonId, name: b.wild.name, level: b.wild.level, exp: 0, moves: await getMoveDetails(p.moves.slice(0,4)), types: b.wild.types, inTeam: false };
                await addDoc(collection(db, "users", auth.currentUser.uid, "pokemon"), newPokemon);
                await updateUserTotalLevels(auth.currentUser.uid, b.wild.level);
                currentBattle = null;
                document.getElementById('battle-area').classList.add('hidden');
                isProcessing = false;
                stopBattleMusic();
            } else {
                addBattleLog(`The wild ${b.wild.name} broke free!`);
                setTimeout(async () => {
                    if (!currentBattle) return;
                    const wM = b.wild.moves[Math.floor(Math.random() * b.wild.moves.length)];
                    const effWild = getTypeEffectiveness(wM.type, b.player.types);
                    let wDmg = Math.floor((wM.power / 5) * (b.wild.level / 2) * effWild);
                    if (wDmg < 1 && effWild > 0) wDmg = 1;
                    b.player.hp = Math.max(0, b.player.hp - wDmg);
                    let effTxt = effWild === 2 ? "It's super effective!" : (effWild === 0.5 ? "It's not very effective..." : "");
                    addBattleLog(`Wild ${b.wild.name} used ${wM.name.toUpperCase()}! Deals ${wDmg} dmg. ${effTxt}`);
                    renderBattleUI();
                    isProcessing = false;
                    if (btn) btn.disabled = false;
                    if (b.player.hp <= 0) {
                        const nextIdx = await handlePlayerFaint(b);
                        if (nextIdx === null) {
                            addBattleLog("All your Pokémon have fainted! You black out...");
                            currentBattle = null;
                            document.getElementById('battle-area').classList.add('hidden');
                            stopBattleMusic();
                            isProcessing = false;
                        } else {

                        }
                    }
                }, 1000);
            }
        }
        async function runTurn(move) {
            if (isProcessing) return;

            const b = currentBattle;
            let eff = getTypeEffectiveness(move.type, b.wild.types);
            let effText = "";
            if (eff === 2) effText = "It's super effective!";
            else if (eff === 0.5) effText = "It's not very effective...";
            else if (eff === 0) effText = "It doesn't affect the wild Pokémon!";
            let dmg = Math.floor((move.power / 5) * (b.player.level / 2) * eff);
            if (dmg < 1 && eff > 0) dmg = 1;
            b.wild.hp = Math.max(0, b.wild.hp - dmg);
            const enemySprite = document.getElementById('e-sprite-btl');
            if (enemySprite) {
                enemySprite.classList.remove('shake-effect');
                void enemySprite.offsetWidth;
                enemySprite.classList.add('shake-effect');
            }
            addBattleLog(`${b.player.name} used ${move.name.toUpperCase()}! Deals ${dmg} dmg. ${effText}`);
            renderBattleUI();
            updateCatchChance();
            if (b.wild.hp <= 0) {
                addBattleLog("Wild Pokemon fainted! Victory!");
                await resolveBattle(true);
                return;
            }
            setTimeout(async () => {
                if (!currentBattle) return;
                const wM = b.wild.moves[Math.floor(Math.random() * b.wild.moves.length)];
                const effWild = getTypeEffectiveness(wM.type, b.player.types);
                let wDmg = Math.floor((wM.power / 5) * (b.wild.level / 2) * effWild);

                    playerSprite.classList.remove('shake-effect');

                        if (confirm(`Delete map "${map.name}"?`)) {
                            await deleteDoc(doc(db, "maps", map.id));
                            loadMaps();
                        }
                    };
                    card.appendChild(delBtn);
                }
                container.appendChild(card);
            }
            document.querySelectorAll('.explore-btn').forEach(btn => {
                btn.onclick = () => {
                    const mapId = btn.dataset.mapId;
                    const selected = maps.find(m => m.id === mapId);
                    if (selected && userTotalLevel >= selected.requiredLevel) {
                        startGameWithMap(selected);
                    } else {
                        alert("You don't meet the level requirement for this map.");
                    }
                };
            });
        }

        function openMapEditModal(map = null) {
            const modal = document.createElement('div');
            modal.className = 'overlay';
            const isNew = !map;
            const mapData = map ? { ...map } : {
                name: '',
                generation: 'I',
                requiredLevel: 0,
                pokemonMin: 1,
                pokemonMax: 151,
                imageUrl: 'map1.png',
                tileClasses: ['dirt', 'grass'],
                tileColors: ['#c2b280', '#78cd54'],
                specialLevelRange: { enabled: false, min: 1, max: 100 },
                specialPokemonList: []
            };
            modal.innerHTML = `
                <div class="modal" style="max-width: 600px;">
                    <h3>${isNew ? 'Create New Map' : 'Edit Map'}</h3>
                    <div style="text-align: left; margin: 20px 0;">
                        <div class="form-group"><label>Map Name</label><input type="text" id="map-name" value="${escapeHtml(mapData.name)}"></div>
                        <div class="form-group"><label>Generation (I-IX)</label><input type="text" id="map-generation" value="${mapData.generation || 'I'}"></div>
                        <div class="form-group"><label>Required Total Level</label><input type="number" id="map-req-level" value="${mapData.requiredLevel}" min="0"></div>
                        <div class="form-group"><label>Pokémon ID Min</label><input type="number" id="map-pokemon-min" value="${mapData.pokemonMin}" min="1" max="20000"></div>
                        <div class="form-group"><label>Pokémon ID Max</label><input type="number" id="map-pokemon-max" value="${mapData.pokemonMax}" min="1" max="20000"></div>
                        <div class="form-group"><label>Map Image (filename from map1.png to map15.png)</label><input type="text" id="map-image" value="${mapData.imageUrl || 'map1.png'}"></div>
                        <div class="form-group"><label>Tile Colors (comma‑separated hex codes, e.g., #c2b280,#78cd54)</label><input type="text" id="map-tile-colors" value="${(mapData.tileColors || ['#c2b280','#78cd54']).join(',')}"></div>
                        <div class="form-group"><label>Tile Classes (comma‑separated, e.g., dirt,grass)</label><input type="text" id="map-tile-classes" value="${(mapData.tileClasses || ['dirt','grass']).join(',')}"></div>
                        <div class="form-group"><label><input type="checkbox" id="special-level-enabled" ${mapData.specialLevelRange?.enabled ? 'checked' : ''}> Enable special level range for wild Pokémon</label></div>
                        <div id="special-level-fields" style="display: ${mapData.specialLevelRange?.enabled ? 'block' : 'none'}; margin-left: 20px;">
                            <div class="form-group"><label>Min Level</label><input type="number" id="special-level-min" value="${mapData.specialLevelRange?.min || 1}"></div>
                            <div class="form-group"><label>Max Level</label><input type="number" id="special-level-max" value="${mapData.specialLevelRange?.max || 100}"></div>
                        </div>
                        <div class="form-group"><label>Special Pokémon IDs (comma‑separated, leave empty to use ID range)</label><input type="text" id="special-pokemon-list" value="${(mapData.specialPokemonList || []).join(',')}"></div>
                    </div>
                    <button id="save-map-btn" class="btn btn-primary">Save</button>
                    <button id="cancel-map-btn" class="btn btn-outline">Cancel</button>
                </div>
            `;
            document.body.appendChild(modal);
            const specialCheckbox = modal.querySelector('#special-level-enabled');
            const specialFields = modal.querySelector('#special-level-fields');
            specialCheckbox.onchange = () => specialFields.style.display = specialCheckbox.checked ? 'block' : 'none';
            modal.querySelector('#save-map-btn').onclick = async () => {
                const newMap = {
                    name: modal.querySelector('#map-name').value.trim(),
                    generation: modal.querySelector('#map-generation').value.trim(),
                    requiredLevel: parseInt(modal.querySelector('#map-req-level').value),
                    pokemonMin: parseInt(modal.querySelector('#map-pokemon-min').value),
                    pokemonMax: parseInt(modal.querySelector('#map-pokemon-max').value),
                    imageUrl: modal.querySelector('#map-image').value.trim(),
                    tileColors: modal.querySelector('#map-tile-colors').value.split(',').map(s => s.trim()),
                    tileClasses: modal.querySelector('#map-tile-classes').value.split(',').map(s => s.trim()),
                    specialLevelRange: {
                        enabled: specialCheckbox.checked,
                        min: parseInt(modal.querySelector('#special-level-min').value),
                        max: parseInt(modal.querySelector('#special-level-max').value)
                    },
                    specialPokemonList: modal.querySelector('#special-pokemon-list').value.split(',').map(s => s.trim()).filter(s => s && !isNaN(parseInt(s))).map(s => parseInt(s))
                };
                if (isNew) {
                    await addDoc(collection(db, "maps"), newMap);
                } else {
                    await updateDoc(doc(db, "maps", map.id), newMap);
                }
                modal.remove();
                loadMaps();
            };
            modal.querySelector('#cancel-map-btn').onclick = () => modal.remove();
        }
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        window.addEventListener('keydown', (e) => {
    if (currentBattle) return;
    switch (e.key) {
        case 'ArrowUp': movePlayer(0, -1); break;
        case 'ArrowDown': movePlayer(0, 1); break;
        case 'ArrowLeft': movePlayer(-1, 0); break;
        case 'ArrowRight': movePlayer(1, 0); break;
        default: return;
    }
    e.preventDefault();
});

        // ========== START GAME WITH SELECTED MAP ==========
        async function startGameWithMap(map) {
            // Check if user has an active Pokémon (i.e., has a starter)
            if (!activePokemonId) {
                alert("You need a starter Pokémon! Please go to the main game first.");
                window.location.href = 'index.html';
                return;
            }
             document.getElementById('current-map-name').innerText = map.name;
            currentMap = map;
            document.getElementById('map-selection-container').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            await generateMapFromTheme(map);
            playMainMusic();
        }

        // ========== MAP MOVEMENT & BATTLE START ==========
        function renderPlayer() {
            document.getElementById('player').style.backgroundImage = `url(${TRAINER_GIF})`;
            document.getElementById('map-grid').style.transform = `translate(${275 - playerPos.x * 50}px, ${175 - playerPos.y * 50}px)`;
        }
        function movePlayer(dx, dy) {
            if (currentBattle) return;
            const n = Date.now();
            if (n - lastMoveTime < MOVE_DELAY) return;
            lastMoveTime = n;
            const nx = playerPos.x + dx, ny = playerPos.y + dy;
            if (nx >= 0 && nx < 50 && ny >= 0 && ny < 50) {
                playerPos.x = nx;
                playerPos.y = ny;
                if (dx !== 0) document.getElementById('player').style.transform = dx < 0 ? 'scaleX(-1)' : 'scaleX(1)';
                renderPlayer();
                if (mapData[ny][nx] !== 'dirt' && Math.random() < 0.15) startBattle();
            }
        }
        async function startBattle() {
    // 1. Initial Checks
    if (!activePokemonId) { 
        alert("No active Pokémon! Please set one in the main game."); 
        return; 
    }
    
    document.getElementById('loading-overlay').classList.remove('hidden');

    try {
        // 2. Fetch Player Team
        const teamSnap = await getDocs(collection(db, "users", auth.currentUser.uid, "pokemon"));
        const team = [];
        let activeIndex = -1;
        
        teamSnap.forEach(doc => {
            const p = doc.data();
            if (p.inTeam) {
                team.push({
                    id: doc.id,
                    pokemonId: p.pokemonId,
                    name: p.name,
                    level: p.level,
                    exp: p.exp,
                    moves: p.moves,
                    types: p.types,
                    hp: p.level * 25,
                    maxHp: p.level * 25
                });
                if (doc.id === activePokemonId) activeIndex = team.length - 1;
            }
        });

        if (team.length === 0) {
            alert("You have no Pokémon in your team!");
            document.getElementById('loading-overlay').classList.add('hidden');
            return;
        }
        if (activeIndex === -1) activeIndex = 0;

        // 3. Determine Wild Pokémon ID (Handling the 1025-10001 Gap)
        let wildId;
        if (currentMap.specialPokemonList && currentMap.specialPokemonList.length > 0 && Math.random() < 0.5) {
            const idx = Math.floor(Math.random() * currentMap.specialPokemonList.length);
            wildId = currentMap.specialPokemonList[idx];
        } else {
            let min = currentMap.pokemonMin || 1;
            let max = currentMap.pokemonMax || 151;
            let validIdFound = false;
            let attempts = 0;

            while (!validIdFound && attempts < 15) {
                wildId = Math.floor(Math.random() * (max - min + 1)) + min;
                if (wildId > 1025 && wildId < 10001) {
                    attempts++;
                    continue;
                }
                validIdFound = true;
            }
            if (!validIdFound) wildId = min;
        }

        // 4. Fetch Wild Pokémon Data (ADMIN LOGIC START)
        const wildRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${wildId}`);
        if (!wildRes.ok) throw new Error("Pokemon not found");
        const wild = await wildRes.json();

        // 5. Fetch Species Data (using the URL inside the 'wild' data)
        // This ensures ID 10001 correctly fetches species 386
        let species = { is_legendary: false, is_mythical: false, generation: { url: "9" } };
        try {
            const speciesRes = await fetch(wild.species.url);
            if (speciesRes.ok) {
                species = await speciesRes.json();
            }
        } catch (e) {
            console.warn("Species data not found, using defaults for form variety.");
        }

        // 6. Determine Wild Level
        let wildLevel;
        if (currentMap.specialLevelRange?.enabled) {
            const sRange = currentMap.specialLevelRange;
            wildLevel = Math.floor(Math.random() * (sRange.max - sRange.min + 1)) + sRange.min;
        } else {
            wildLevel = team[activeIndex].level + Math.floor(Math.random() * 21) - 10;
            wildLevel = Math.min(100, Math.max(1, wildLevel));
        }

        // 7. Final Details (Moves, Records, Special status)
        const wildMoves = await getMoveDetails(wild.moves.slice(0, 4));
        const count = await trackRecord(wildId, wild.name);
        
        const isLegendary = species.is_legendary || false;
        const isMythical = species.is_mythical || false;
        const isParadox = [984, 985, 986, 987, 988, 989, 990, 991, 992, 993, 994, 995, 1005, 1006, 1009, 1010, 1020, 1021, 1022, 1023].includes(wildId);
        const isSpecial = isLegendary || isMythical || isParadox;
        
        const generation = (() => {
            if (!species.generation?.url) return 'IX';
            const genParts = species.generation.url.split('/').filter(p => p);
            const genId = genParts.pop();
            const roman = ['0', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX'];
            return roman[genId] || genId;
        })();

        // 8. Preview UI
        const preview = document.getElementById('encounter-preview');
        const ps = document.getElementById('preview-sprite');
        const pn = document.getElementById('preview-name');
        const badgesDiv = document.getElementById('preview-badges');
        const card = document.getElementById('encounter-card');

        loadImageWithFallback(ps, getBattleSpriteUrl(wildId, 'front'));
        pn.innerText = wild.name.toUpperCase();

        let badgesHtml = '';
        wild.types.forEach(t => {
            badgesHtml += `<span class="type-badge" style="background: ${getTypeColor(t.type.name)};">${t.type.name.toUpperCase()}</span>`;
        });
        badgesHtml += `<span class="generation-badge">Gen ${generation}</span>`;
        if (isLegendary) badgesHtml += `<span class="special-badge">⭐ LEGENDARY</span>`;
        if (isMythical) badgesHtml += `<span class="special-badge">✨ MYTHICAL</span>`;
        if (isParadox) badgesHtml += `<span class="special-badge">🌀 PARADOX</span>`;
        
        badgesDiv.innerHTML = badgesHtml;
        if (isSpecial) card.classList.add('special');
        else card.classList.remove('special');

        preview.classList.remove('hidden');

        // 9. Start Battle Timeout
        setTimeout(() => {
            preview.classList.add('hidden');
            currentBattle = {
                playerTeam: team,
                activePokemonIndex: activeIndex,
                player: team[activeIndex],
                wild: {
                    pokemonId: wildId,
                    name: wild.name,
                    level: wildLevel,
                    hp: wildLevel * 25,
                    maxHp: wildLevel * 25,
                    types: wild.types.map(t => t.type.name),
                    moves: wildMoves,
                    encounterCount: count,
                    isSpecial: isSpecial
                }
            };
            renderBattleUI();
            document.getElementById('battle-area').classList.remove('hidden');
            addBattleLog(`A wild ${wild.name.toUpperCase()} (Lv.${wildLevel}) appeared!`);
            updateCatchChance();
            document.getElementById('loading-overlay').classList.add('hidden');
            playBattleMusic();
        }, 3000);

    } catch (err) {
        console.error("Battle failed to start:", err);
        alert("Encounter failed: " + err.message);
        document.getElementById('loading-overlay').classList.add('hidden');
    }
}
        async function showMapPokemonList(map) {
    const modal = document.getElementById('map-info-modal');
    const tableBody = document.getElementById('map-pokemon-table-body');
    const title = document.getElementById('map-info-title');
    
    title.innerText = `${map.name} - Pokémon List`;
    tableBody.innerHTML = '<tr><td colspan="3" style="padding: 40px; text-align: center;">Loading Pokémon data...</td></tr>';
    modal.classList.remove('hidden');

    // 1. Compile IDs
    let idList = [];
    // Add IDs from range
    for (let i = map.pokemonMin; i <= map.pokemonMax; i++) {
        if (i > 1025 && i < 10001) continue; // Skip the gap
        idList.push(i);
    }
    // Add Special IDs
    if (map.specialPokemonList) {
        map.specialPokemonList.forEach(id => {
            if (!idList.includes(id)) idList.push(id);
        });
    }
    idList.sort((a, b) => a - b);

    // 2. Optimization: Don't load 1000+ at once (optional, but good for Gen IX)
    const displayLimit = 150; 
    const listToLoad = idList.slice(0, displayLimit);

    let html = '';
    
    // 3. Batch fetch basic data
    try {
        const results = await Promise.all(listToLoad.map(async (id) => {
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                if (!res.ok) return null;
                const data = await res.json();
                return {
                    id: id,
                    name: data.name.replace('-', ' '),
                    types: data.types.map(t => t.type.name),
                    sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
                };
            } catch (e) { return null; }
        }));

        const filteredResults = results.filter(r => r !== null);

        filteredResults.forEach(p => {
            html += `
                <tr style="border-bottom: 1px solid var(--border); transition: 0.2s;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">
                    <td style="padding: 8px; text-align: center;">
                        <img src="${p.sprite}" style="width: 50px; height: 50px; object-fit: contain;" 
                             onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
                    </td>
                    <td style="padding: 8px; font-weight: bold; text-transform: capitalize;">${p.name} <br><small style="color: #999;">#${p.id}</small></td>
                    <td style="padding: 8px;">${generateTypeBadges(p.types)}</td>
                </tr>
            `;
        });

        if (idList.length > displayLimit) {
            html += `<tr><td colspan="3" style="padding: 15px; text-align: center; font-size: 0.8rem; color: #999;">...and ${idList.length - displayLimit} more</td></tr>`;
        }

        tableBody.innerHTML = html;
    } catch (err) {
        tableBody.innerHTML = '<tr><td colspan="3" style="color: var(--danger); padding: 20px;">Failed to load Pokémon list.</td></tr>';
    }
}
        
        // ========== MUSIC ==========
        function playMainMusic() { if (!isMuted) { battleMusic.pause(); battleMusic.currentTime = 0; bgMusic.play().catch(e=>console.log("Autoplay blocked:", e)); } }
        function playBattleMusic() { if (!isMuted) { bgMusic.pause(); bgMusic.currentTime = 0; battleMusic.play().catch(e=>console.log("Autoplay blocked:", e)); } }
        function stopBattleMusic() { battleMusic.pause(); battleMusic.currentTime = 0; if (!isMuted) bgMusic.play().catch(e=>console.log("Autoplay blocked:", e)); }

        // ========== AUTH & INIT ==========
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uDoc = await getDoc(doc(db, "users", user.uid));
                const data = uDoc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                userTotalLevel = data?.totalLevels || 0;
                isAdmin = data?.role === 'admin';
                // Get active Pokémon ID if exists
                activePokemonId = data?.activePokemonId || null;
                if (activePokemonId) {
                    const a = await getDoc(doc(db, "users", user.uid, "pokemon", activePokemonId));
                    if (a.exists()) cachedActivePokemon = { id: a.id, ...a.data() };
                }
                if (isAdmin) document.getElementById('add-map-btn').classList.remove('hidden');
                await loadMaps();
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('map-selection-container').classList.remove('hidden');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('map-selection-container').classList.add('hidden');
                bgMusic.pause();
                battleMusic.pause();
            }
        });

        // Add Map button handler
        document.getElementById('add-map-btn').onclick = () => openMapEditModal();

        // Event listeners for movement, logout, etc.
        document.querySelector('.arrow-up')?.addEventListener('click', () => movePlayer(0, -1));
        document.querySelector('.arrow-down')?.addEventListener('click', () => movePlayer(0, 1));
        document.querySelector('.arrow-left')?.addEventListener('click', () => movePlayer(-1, 0));
        document.querySelector('.arrow-right')?.addEventListener('click', () => movePlayer(1, 0));
        document.getElementById('back-to-maps-btn')?.addEventListener('click', () => {
            if (currentBattle) { alert("Finish the battle first."); return; }
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('map-selection-container').classList.remove('hidden');
            stopBattleMusic();
            playerPos = { x: 25, y: 25 };
        });
        document.getElementById('logout-btn')?.addEventListener('click', () => signOut(auth).then(()=>location.reload()));
        document.getElementById('catch-btn')?.addEventListener('click', attemptCatch);
        document.getElementById('volume-toggle')?.addEventListener('click', () => {
            isMuted = !isMuted;
            const v = document.getElementById('volume-toggle');
            if (isMuted) { bgMusic.pause(); battleMusic.pause(); v.innerText = '🔇'; }
            else { if (currentBattle && document.getElementById('battle-area') && !document.getElementById('battle-area').classList.contains('hidden')) battleMusic.play().catch(e=>{}); else bgMusic.play().catch(e=>{}); v.innerText = '🔊'; }
        });

        // Login/register buttons
      
    </script>
