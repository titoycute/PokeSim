<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PokeSim - Trainer Ranking</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #3b4cca;
            --primary-dark: #00238f;
            --border: #e2e8f0;
            --text-dark: #2d3748;
            --text-light: #5a6e8a;
            --success: #48bb78;
            --danger: #f56565;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }
        body {
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--primary-dark);
            border-left: 4px solid var(--primary);
            padding-left: 16px;
            margin: 0;
        }
        .user-rank {
            background: #f0f2f5;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--primary-dark);
        }
        .user-rank span {
            color: var(--primary);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            margin: 10px 0 20px;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 1rem;
        }
        .trainer-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .trainer-card {
            background: white;
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }
        .trainer-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
     
.rank-number {
    display: inline-block;
    font-weight: bold;
    margin-right: 8px;
    padding: 2px 8px;
    border-radius: 20px;
    background: #e2e8f0;
    color: #2d3748;
}
.rank-number.rank-1 {
    background: var(--gold);
    color: #333;
}
.rank-number.rank-2 {
    background: var(--silver);
    color: #333;
}
.rank-number.rank-3 {
    background: var(--bronze);
    color: white;
}
.trainer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 8px;
}
.trainer-name {
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--primary-dark);
    display: flex;
    align-items: center;
    gap: 4px;
}


        .trainer-stats {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .trainer-stats span {
            font-weight: bold;
            color: var(--text-dark);
        }
        .team-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .team-preview-item {
            flex: 1 1 90px;
            text-align: center;
            background: #f8fafc;
            border-radius: 16px;
            padding: 8px 4px;
            transition: 0.2s;
        }
        .team-preview-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 4px;
        }
        .team-preview-name {
            font-size: 0.7rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .team-preview-types {
            font-size: 0.65rem;
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 2px;
        }
        .team-preview-level {
            font-size: 0.65rem;
            color: var(--text-light);
        }
        .type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .move-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 2px 4px;
            color: white;
            text-shadow: 0 0 1px rgba(0,0,0,0.3);
        }
        .mon-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .mon-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-right: 20px;
        }
        .mon-info {
            flex: 1;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 32px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            max-height: 80vh;
            overflow-y: auto;
        }
        .hidden {
            display: none !important;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
        }
        .load-more-btn {
            display: block;
            width: 200px;
            margin: 30px auto 0;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .trainer-cards {
                grid-template-columns: 1fr;
            }
            .team-preview-item {
                flex: 1 1 70px;
            }
            .team-preview-item img {
                width: 40px;
                height: 40px;
            }
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Game</a>
        <div class="header">
            <h1>🏆 Trainer Ranking</h1>
            <div id="user-rank-display" class="user-rank">Loading...</div>
        </div>
        <input type="text" id="ranking-search" class="search-input" placeholder="Search by trainer name or email...">
        <div id="trainer-cards-container" class="trainer-cards">
            <div class="loading">Loading leaderboard...</div>
        </div>
        <button id="load-more-btn" class="btn btn-outline load-more-btn hidden">Load More</button>
    </div>

    <!-- Trainer Team Modal -->
    <div id="trainer-team-modal" class="overlay hidden" onclick="this.classList.add('hidden')">
        <div class="modal" onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="trainer-team-name">Trainer Team</h2>
                <button onclick="document.getElementById('trainer-team-modal').classList.add('hidden')" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="trainer-team-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDkCE0wBrsQ1s-7zplvTtWOSE28ISaCFfQ", authDomain: "pokesim-7f9b7.firebaseapp.com", projectId: "pokesim-7f9b7", storageBucket: "pokesim-7f9b7.firebasestorage.app", messagingSenderId: "1087100425430", appId: "1:1087100425430:web:9558a79ee5330d4a792577" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Helper functions
        function getTypeColor(type) {
            const colors = {
                normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
                grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
                ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
                rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', dark: '#705746',
                steel: '#B7B7CE', fairy: '#D685AD'
            };
            return colors[type] || '#777777';
        }

        function getStaticSpriteUrl(id) {
            return [`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`, `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`];
        }

        function loadImageWithFallback(img, urls) {
            let i = 0;
            function next() {
                if (i >= urls.length) return;
                img.src = urls[i];
                img.onerror = () => { i++; next(); };
            }
            next();
        }

        function getExpNeededForNextLevel(l) { return l * 300; }

        function generateTypeBadges(types) {
            return types.map(t => `<span class="type-badge" style="background: ${getTypeColor(t)};">${t.toUpperCase()}</span>`).join('');
        }

        // Load all trainers (basic stats)
        async function loadAllTrainers() {
            const usersSnap = await getDocs(collection(db, "users"));
            const trainers = [];
            for (const docSnap of usersSnap.docs) {
                const data = docSnap.data();
                if (!data.hasStarter) continue;
                const trainerName = data.trainerName || docSnap.id.split('@')[0];
                trainers.push({
                    uid: docSnap.id,
                    name: trainerName,
                    email: docSnap.id,
                    totalLevels: data.totalLevels || 0,
                    totalEncounters: data.totalEncounters || 0
                });
            }
            // Sort by totalLevels descending globally
            trainers.sort((a, b) => b.totalLevels - a.totalLevels);
            return trainers;
        }

        // Fetch team and collection count for a single trainer
        async function fetchTrainerDetails(uid) {
            try {
                const pokemonSnap = await getDocs(collection(db, "users", uid, "pokemon"));
                let team = [];
                let collectionCount = 0;
                pokemonSnap.forEach(doc => {
                    const p = doc.data();
                    collectionCount++;
                    if (p.inTeam) {
                        team.push(p);
                    }
                });
                return { team, collectionCount };
            } catch (error) {
                console.error(`Failed to load details for ${uid}`, error);
                return { team: [], collectionCount: 0 };
            }
        }

        // Render a single card with rank
        function renderTrainerCard(trainer, rank, team, collectionCount) {
            const card = document.createElement('div');
            card.className = 'trainer-card';
            card.setAttribute('data-uid', trainer.uid);

            // Rank badge
           // Rank number badge
const rankNumber = document.createElement('span');
rankNumber.className = `rank-number rank-${rank > 3 ? 'other' : rank}`;
if (rank === 1) rankNumber.innerText = '#1';
else if (rank === 2) rankNumber.innerText = '#2';
else if (rank === 3) rankNumber.innerText = '#3';
else rankNumber.innerText = `#${rank}`;

// Header
const header = document.createElement('div');
header.className = 'trainer-header';
const nameDiv = document.createElement('div');
nameDiv.className = 'trainer-name';
nameDiv.appendChild(rankNumber);
nameDiv.appendChild(document.createTextNode(escapeHtml(trainer.name)));
header.appendChild(nameDiv);
const statsDiv = document.createElement('div');
statsDiv.className = 'trainer-stats';
statsDiv.innerHTML = `
    <div>🏆 <span>${trainer.totalLevels}</span></div>
    <div>👥 <span>${trainer.totalEncounters}</span></div>
    <div>📦 <span>${collectionCount}</span></div>
`;
header.appendChild(statsDiv);
card.appendChild(header);

            // Team preview
            const teamPreview = document.createElement('div');
            teamPreview.className = 'team-preview';
            if (team.length === 0) {
                teamPreview.innerHTML = '<div style="color: #999; font-size: 0.8rem;">No Pokémon in team</div>';
            } else {
                for (const mon of team) {
                    const item = document.createElement('div');
                    item.className = 'team-preview-item';
                    const img = document.createElement('img');
                    loadImageWithFallback(img, getStaticSpriteUrl(mon.pokemonId));
                    item.appendChild(img);
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'team-preview-name';
                    nameSpan.innerText = mon.name.toUpperCase();
                    item.appendChild(nameSpan);
                    const typesDiv = document.createElement('div');
                    typesDiv.className = 'team-preview-types';
                    typesDiv.innerHTML = generateTypeBadges(mon.types);
                    item.appendChild(typesDiv);
                    const levelSpan = document.createElement('div');
                    levelSpan.className = 'team-preview-level';
                    levelSpan.innerText = `Lv ${mon.level}`;
                    item.appendChild(levelSpan);
                    teamPreview.appendChild(item);
                }
            }
            card.appendChild(teamPreview);

            // Click handler to show full team modal
            card.addEventListener('click', () => showTrainerTeam(trainer.uid));
            return card;
        }

        // Show full team in modal
        async function showTrainerTeam(uid) {
            try {
                const teamSnap = await getDocs(collection(db, "users", uid, "pokemon"));
                const team = [];
                teamSnap.forEach(doc => {
                    const p = doc.data();
                    if (p.inTeam) {
                        team.push(p);
                    }
                });
                const userDoc = await getDoc(doc(db, "users", uid));
                const userData = userDoc.data();
                const trainerName = userData?.trainerName || uid.split('@')[0];
                document.getElementById('trainer-team-name').innerText = `${escapeHtml(trainerName)}'s Team`;
                const container = document.getElementById('trainer-team-list');
                container.innerHTML = '';
                if (team.length === 0) {
                    container.innerHTML = '<p>This trainer has no Pokémon in their team.</p>';
                } else {
                    for (const mon of team) {
                        const div = document.createElement('div');
                        div.className = 'mon-item';
                        const img = document.createElement('img');
                        loadImageWithFallback(img, getStaticSpriteUrl(mon.pokemonId));
                        div.appendChild(img);
                        const info = document.createElement('div');
                        info.className = 'mon-info';
                        const expNeeded = getExpNeededForNextLevel(mon.level);
                        const expCur = mon.exp || 0;
                        const prog = Math.floor((expCur/expNeeded)*100);
                        const moveBadges = mon.moves.map(m => `<span class="move-badge" style="background: ${getTypeColor(m.type)};">${m.name.toUpperCase()}</span>`).join('');
                        info.innerHTML = `
                            <b>${escapeHtml(mon.name.toUpperCase())}</b> (Lvl ${mon.level} | XP: ${expCur}/${expNeeded} [${prog}%])<br>
                            <small>${mon.types.join(', ')}</small><br>
                            <div style="margin-top: 6px;">${moveBadges}</div>
                        `;
                        div.appendChild(info);
                        container.appendChild(div);
                    }
                }
                document.getElementById('trainer-team-modal').classList.remove('hidden');
            } catch (error) {
                console.error("Failed to load trainer team:", error);
                alert("Could not load the trainer's team.");
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Global data
        let allTrainers = [];           // sorted list of all trainers (with only basic stats)
        let currentUserUid = null;
        let currentUserName = '';
        let currentUserTotalLevels = 0;
        let visibleCount = 25;          // initial visible count
        let isLoading = false;

        async function refreshLeaderboard(filterText = '') {
            const container = document.getElementById('trainer-cards-container');
            container.innerHTML = '<div class="loading">Loading leaderboard...</div>';
            const loadMoreBtn = document.getElementById('load-more-btn');

            if (allTrainers.length === 0) {
                allTrainers = await loadAllTrainers();
            }
            let filtered = allTrainers;
            if (filterText) {
                const lower = filterText.toLowerCase();
                filtered = allTrainers.filter(t => t.name.toLowerCase().includes(lower) || t.email.toLowerCase().includes(lower));
            }
            // Determine visible slice
            const visible = filtered.slice(0, visibleCount);
            const hasMore = visibleCount < filtered.length;

            // Fetch details for visible trainers in parallel
            const detailsPromises = visible.map(t => fetchTrainerDetails(t.uid));
            const details = await Promise.all(detailsPromises);

            // Render cards
            container.innerHTML = '';
            for (let i = 0; i < visible.length; i++) {
                const trainer = visible[i];
                const rank = filtered.findIndex(t => t.uid === trainer.uid) + 1; // rank in filtered list (1-indexed)
                const card = renderTrainerCard(trainer, rank, details[i].team, details[i].collectionCount);
                container.appendChild(card);
            }
            if (visible.length === 0) {
                container.innerHTML = '<div class="loading">No trainers found.</div>';
            }

            // Show/hide load more button
            if (hasMore && !filterText) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        // Load more (increase visibleCount by 25)
        async function loadMore() {
            if (isLoading) return;
            isLoading = true;
            visibleCount += 25;
            await refreshLeaderboard(document.getElementById('ranking-search').value);
            isLoading = false;
        }

        // Display current user's rank in header
        function updateUserRankDisplay() {
            const rankDiv = document.getElementById('user-rank-display');
            if (!currentUserUid) {
                rankDiv.innerHTML = 'Not logged in';
                return;
            }
            // Find user in allTrainers (sorted)
            const index = allTrainers.findIndex(t => t.uid === currentUserUid);
            if (index === -1) {
                rankDiv.innerHTML = `👤 ${escapeHtml(currentUserName)} (unranked)`;
            } else {
                const rank = index + 1;
                rankDiv.innerHTML = `👤 ${escapeHtml(currentUserName)} • Rank #${rank}`;
                // add a little flair for top ranks
                if (rank === 1) rankDiv.style.background = 'var(--gold)';
                else if (rank === 2) rankDiv.style.background = 'var(--silver)';
                else if (rank === 3) rankDiv.style.background = 'var(--bronze)';
                else rankDiv.style.background = '#f0f2f5';
            }
        }

        // Main initialization
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUserUid = user.uid;
            // Fetch user's own data to get trainerName and totalLevels
            const userDoc = await getDoc(doc(db, "users", currentUserUid));
            const userData = userDoc.data();
            currentUserName = userData?.trainerName || user.email.split('@')[0];
            currentUserTotalLevels = userData?.totalLevels || 0;

            // Load all trainers first, then display ranking and user rank
            allTrainers = await loadAllTrainers();
            updateUserRankDisplay();
            await refreshLeaderboard();

            // Set up search
            const searchInput = document.getElementById('ranking-search');
            if (searchInput) {
                let debounceTimeout;
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(debounceTimeout);
                    debounceTimeout = setTimeout(() => {
                        visibleCount = 25; // reset to 25 when searching
                        refreshLeaderboard(e.target.value);
                    }, 300);
                });
            }

            // Load more button
            const loadMoreBtn = document.getElementById('load-more-btn');
            loadMoreBtn.addEventListener('click', loadMore);
        });
    </script>
</body>
</html>
