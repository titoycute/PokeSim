<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PokeSim | Game Updates</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #3b4cca;
            --primary-dark: #00238f;
            --accent: #ffde00;
            --text-dark: #2d3748;
            --text-light: #5a6e8a;
            --border: #e2e8f0;
            --success: #48bb78;
            --danger: #f56565;
        }
        body {
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .back-link:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        h1 {
            color: var(--primary-dark);
            font-size: 2rem;
        }
        .admin-actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background: #e53e3e;
        }
        .updates-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .update-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: 0.2s;
        }
        .update-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .update-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .update-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-dark);
        }
        .update-date {
            color: var(--text-light);
            font-size: 0.85rem;
        }
        .update-version {
            background: var(--accent);
            color: #333;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .update-description {
            color: var(--text-dark);
            line-height: 1.5;
            margin: 12px 0;
            overflow-x: auto;
        }
        .update-description table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }
        .update-description th,
        .update-description td {
            border: 1px solid var(--border, #ddd);
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        .update-description th {
            background: var(--primary, #3b4cca);
            color: white;
        }
        .update-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }
        .modal {
            max-width: 95%;
            width: 1000px;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 0.95rem;
        }
        .editor-split {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .editor-left, .editor-right {
            flex: 1;
            min-width: 250px;
        }
        .editor-left textarea {
            height: 450px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }
        .preview-box {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            height: 450px;
            overflow-y: auto;
            background: var(--card-bg);
        }
        [contenteditable="true"] {
            outline: none;
            background: #fefefe;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .toolbar-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .toolbar-btn:hover {
            background: var(--primary);
            color: white;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            backdrop-filter: blur(4px);
        }
        .hidden {
            display: none !important;
        }
        .loader, .empty-message {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        @media (max-width: 700px) {
            .editor-split { flex-direction: column; }
            .editor-left textarea, .preview-box { height: 300px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html" class="back-link">← Back to Game</a>
        <h1>📢 Game Updates</h1>
        <div id="admin-controls" style="display: none;">
            <button id="add-update-btn" class="btn btn-primary">➕ Add Update</button>
        </div>
    </div>
    <div id="updates-container" class="updates-list">
        <div class="loader">Loading updates...</div>
    </div>
</div>

<!-- Edit Modal with split view + bidirectional editing -->
<div id="update-modal" class="overlay hidden" onclick="this.classList.add('hidden')">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 id="modal-title" style="margin-bottom:20px;">Add Update</h2>
        <div class="form-group">
            <label>Version (optional)</label>
            <input type="text" id="update-version" placeholder="e.g., v1.2.0">
        </div>
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="update-title" placeholder="What's new?">
        </div>
        <div class="form-group">
            <label>Date *</label>
            <input type="date" id="update-date">
        </div>
        <div class="form-group">
            <label>Description (HTML supported)</label>
            <div class="toolbar">
                <button type="button" class="toolbar-btn" id="btn-bold"><b>Bold</b></button>
                <button type="button" class="toolbar-btn" id="btn-italic"><i>Italic</i></button>
                <button type="button" class="toolbar-btn" id="btn-list-bullet">• Bullet List</button>
                <button type="button" class="toolbar-btn" id="btn-list-numbered">1. Numbered List</button>
                <button type="button" class="toolbar-btn" id="btn-table">📊 Insert Table</button>
                <button type="button" class="toolbar-btn" id="btn-pre-table">📋 Paste Full Table</button>
            </div>
            <div class="editor-split">
                <div class="editor-left">
                    <textarea id="html-editor" placeholder="Write or paste HTML here. Edit directly, or edit the preview on the right."></textarea>
                </div>
                <div class="editor-right">
                    <div class="preview-box" id="html-preview" contenteditable="true"></div>
                </div>
            </div>
            <small>✅ Both sides are editable. Changes on one side update the other automatically. Tables, lists, bold, etc. work.</small>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
            <button id="save-update-btn" class="btn btn-primary">Save</button>
            <button id="cancel-modal-btn" class="btn btn-outline">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, orderBy, query, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkCE0wBrsQ1s-7zplvTtWOSE28ISaCFfQ",
        authDomain: "pokesim-7f9b7.firebaseapp.com",
        projectId: "pokesim-7f9b7",
        storageBucket: "pokesim-7f9b7.firebasestorage.app",
        messagingSenderId: "1087100425430",
        appId: "1:1087100425430:web:9558a79ee5330d4a792577"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isAdmin = false;
    let currentEditingId = null;
    let updating = false; // prevent recursive sync

    const htmlEditor = document.getElementById('html-editor');
    const previewDiv = document.getElementById('html-preview');

    // Helper: convert plain text (old updates) to HTML
    function formatDescription(text) {
        if (/<[a-z][\s>]/i.test(text)) return text;
        let result = text;
        result = result.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        result = result.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        result = result.replace(/\*(.*?)\*/g, '<i>$1</i>');
        result = result.replace(/\n/g, '<br>');
        return result;
    }

    // Update preview from textarea (left → right)
    function updatePreviewFromTextarea() {
        if (updating) return;
        updating = true;
        let rawHtml = htmlEditor.value;
        if (!/<[a-z][\s>]/i.test(rawHtml)) {
            rawHtml = formatDescription(rawHtml);
        }
        const sanitized = DOMPurify.sanitize(rawHtml, {
            ALLOWED_TAGS: ['b','i','em','strong','a','br','p','ul','li','h1','h2','h3','h4','h5','h6','span','div','table','thead','tbody','tr','td','th','style','blockquote','code','pre','img','figure','figcaption','ol'],
            ALLOWED_ATTR: ['href','target','class','style','src','alt','width','height','border','cellpadding','cellspacing']
        });
        previewDiv.innerHTML = sanitized;
        updating = false;
    }

    // Update textarea from preview (right → left)
    function updateTextareaFromPreview() {
        if (updating) return;
        updating = true;
        let newHtml = previewDiv.innerHTML;
        htmlEditor.value = newHtml;
        updating = false;
    }

    // Event listeners for two-way sync
    htmlEditor.addEventListener('input', updatePreviewFromTextarea);
    previewDiv.addEventListener('blur', updateTextareaFromPreview);
    previewDiv.addEventListener('input', updateTextareaFromPreview);

    // Toolbar helpers
    function wrapText(openTag, closeTag) {
        if (!htmlEditor) return;
        const start = htmlEditor.selectionStart;
        const end = htmlEditor.selectionEnd;
        const selected = htmlEditor.value.substring(start, end);
        const newText = htmlEditor.value.substring(0, start) + openTag + selected + closeTag + htmlEditor.value.substring(end);
        htmlEditor.value = newText;
        htmlEditor.selectionStart = start + openTag.length;
        htmlEditor.selectionEnd = end + openTag.length;
        htmlEditor.focus();
        updatePreviewFromTextarea();
    }

    function insertBulletList() {
        const cursor = htmlEditor.selectionStart;
        let lineStart = htmlEditor.value.lastIndexOf('\n', cursor - 1) + 1;
        let lineEnd = htmlEditor.value.indexOf('\n', cursor);
        if (lineEnd === -1) lineEnd = htmlEditor.value.length;
        const line = htmlEditor.value.substring(lineStart, lineEnd);
        if (line.trim().startsWith('• ')) {
            const newLine = line.replace(/^•\s+/, '');
            htmlEditor.value = htmlEditor.value.substring(0, lineStart) + newLine + htmlEditor.value.substring(lineEnd);
            htmlEditor.setSelectionRange(lineStart, lineStart + newLine.length);
        } else {
            const newLine = '• ' + line;
            htmlEditor.value = htmlEditor.value.substring(0, lineStart) + newLine + htmlEditor.value.substring(lineEnd);
            htmlEditor.setSelectionRange(lineStart + 2, lineStart + 2 + line.length);
        }
        htmlEditor.focus();
        updatePreviewFromTextarea();
    }

    function insertNumberedList() {
        const cursor = htmlEditor.selectionStart;
        let lineStart = htmlEditor.value.lastIndexOf('\n', cursor - 1) + 1;
        let lineEnd = htmlEditor.value.indexOf('\n', cursor);
        if (lineEnd === -1) lineEnd = htmlEditor.value.length;
        const line = htmlEditor.value.substring(lineStart, lineEnd);
        const match = line.match(/^(\d+)\.\s+/);
        if (match) {
            const newLine = line.replace(/^\d+\.\s+/, '');
            htmlEditor.value = htmlEditor.value.substring(0, lineStart) + newLine + htmlEditor.value.substring(lineEnd);
            htmlEditor.setSelectionRange(lineStart, lineStart + newLine.length);
        } else {
            let num = 1;
            const before = htmlEditor.value.substring(0, lineStart);
            const lines = before.split('\n');
            for (let i = lines.length - 1; i >= 0; i--) {
                const m = lines[i].match(/^(\d+)\.\s+/);
                if (m) { num = parseInt(m[1]) + 1; break; }
            }
            const newLine = num + '. ' + line;
            htmlEditor.value = htmlEditor.value.substring(0, lineStart) + newLine + htmlEditor.value.substring(lineEnd);
            htmlEditor.setSelectionRange(lineStart + (num + '.').length + 1, lineStart + (num + '.').length + 1 + line.length);
        }
        htmlEditor.focus();
        updatePreviewFromTextarea();
    }

    function insertSimpleTable() {
        const rows = prompt("Number of rows:", "3");
        const cols = prompt("Number of columns:", "3");
        if (!rows || !cols) return;
        let table = '<table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%;">';
        for (let i = 0; i < parseInt(rows); i++) {
            table += '<tr>';
            for (let j = 0; j < parseInt(cols); j++) {
                table += '<td style="border: 1px solid #ddd; padding: 8px;">&nbsp;</td>';
            }
            table += '</tr>';
        }
        table += '</table><br>';
        wrapText(table, '');
    }

    function pasteFullTable() {
        const html = prompt("Paste your HTML table code:", '<table border="1" cellpadding="8"><tr><th>Header</th></tr><tr><td>Content</td></tr></table>');
        if (html) wrapText(html, '');
    }

    // Load updates from Firestore
    async function loadUpdates() {
        const container = document.getElementById('updates-container');
        container.innerHTML = '<div class="loader">Loading updates...</div>';
        try {
            const q = query(collection(db, "updates"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            const updates = [];
            querySnapshot.forEach(doc => {
                updates.push({ id: doc.id, ...doc.data() });
            });
            if (updates.length === 0) {
                container.innerHTML = '<div class="empty-message">No updates yet. Check back later!</div>';
                return;
            }
            container.innerHTML = '';
            updates.forEach(update => {
                const card = document.createElement('div');
                card.className = 'update-card';
                card.dataset.update = JSON.stringify({
                    id: update.id,
                    title: update.title,
                    version: update.version || '',
                    date: update.date,
                    description: update.description
                });
                const formattedDate = new Date(update.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                let descToShow = update.description;
                if (!/<[a-z][\s>]/i.test(descToShow)) {
                    descToShow = formatDescription(descToShow);
                }
                const safeDescription = DOMPurify.sanitize(descToShow, {
                    ALLOWED_TAGS: ['b','i','em','strong','a','br','p','ul','li','h1','h2','h3','h4','h5','h6','span','div','table','thead','tbody','tr','td','th','style','blockquote','code','pre','img','figure','figcaption','ol'],
                    ALLOWED_ATTR: ['href','target','class','style','src','alt','width','height','border','cellpadding','cellspacing']
                });
                card.innerHTML = `
                    <div class="update-header">
                        <div class="update-title">${escapeHtml(update.title)}</div>
                        <div class="update-date">${formattedDate}</div>
                    </div>
                    ${update.version ? `<div class="update-version">${escapeHtml(update.version)}</div>` : ''}
                    <div class="update-description">${safeDescription}</div>
                    ${isAdmin ? `
                        <div class="update-actions">
                            <button class="btn btn-outline edit-update" data-id="${update.id}">✏️ Edit</button>
                            <button class="btn btn-danger delete-update" data-id="${update.id}">🗑️ Delete</button>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
            if (isAdmin) {
                document.querySelectorAll('.edit-update').forEach(btn => {
                    btn.onclick = () => openEditModal(btn.dataset.id);
                });
                document.querySelectorAll('.delete-update').forEach(btn => {
                    btn.onclick = async () => {
                        if (confirm("Delete this update?")) {
                            await deleteDoc(doc(db, "updates", btn.dataset.id));
                            loadUpdates();
                        }
                    };
                });
            }
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="empty-message">Failed to load updates.</div>';
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function openEditModal(id = null) {
        currentEditingId = id;
        const modal = document.getElementById('update-modal');
        const titleElem = document.getElementById('modal-title');
        const versionInput = document.getElementById('update-version');
        const titleInput = document.getElementById('update-title');
        const dateInput = document.getElementById('update-date');

        if (id) {
            const btn = document.querySelector(`.edit-update[data-id="${id}"]`);
            if (!btn) return;
            const card = btn.closest('.update-card');
            if (!card || !card.dataset.update) return;
            const updateData = JSON.parse(card.dataset.update);
            titleElem.innerText = 'Edit Update';
            versionInput.value = updateData.version || '';
            titleInput.value = updateData.title;
            dateInput.value = updateData.date;
            htmlEditor.value = updateData.description;
        } else {
            titleElem.innerText = 'Add Update';
            versionInput.value = '';
            titleInput.value = '';
            dateInput.value = new Date().toISOString().split('T')[0];
            htmlEditor.value = '';
        }
        updatePreviewFromTextarea();
        modal.classList.remove('hidden');
    }

    async function saveUpdate() {
        const version = document.getElementById('update-version').value.trim();
        const title = document.getElementById('update-title').value.trim();
        const date = document.getElementById('update-date').value;
        let description = htmlEditor.value;

        if (!title || !date || !description.trim()) {
            alert("Please fill in Title, Date, and Description.");
            return;
        }

        const updateData = {
            title: title,
            date: date,
            description: description,
            version: version || null,
            updatedAt: new Date()
        };

        try {
            if (currentEditingId) {
                await updateDoc(doc(db, "updates", currentEditingId), updateData);
            } else {
                await addDoc(collection(db, "updates"), updateData);
            }
            document.getElementById('update-modal').classList.add('hidden');
            loadUpdates();
        } catch (err) {
            console.error(err);
            alert("Failed to save update.");
        }
    }

    // Event listeners
    document.getElementById('add-update-btn').onclick = () => openEditModal();
    document.getElementById('save-update-btn').onclick = saveUpdate;
    document.getElementById('cancel-modal-btn').onclick = () => document.getElementById('update-modal').classList.add('hidden');

    document.getElementById('btn-bold')?.addEventListener('click', () => wrapText('<b>', '</b>'));
    document.getElementById('btn-italic')?.addEventListener('click', () => wrapText('<i>', '</i>'));
    document.getElementById('btn-list-bullet')?.addEventListener('click', insertBulletList);
    document.getElementById('btn-list-numbered')?.addEventListener('click', insertNumberedList);
    document.getElementById('btn-table')?.addEventListener('click', insertSimpleTable);
    document.getElementById('btn-pre-table')?.addEventListener('click', pasteFullTable);

    // Auth state
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const userData = userDoc.data();
            isAdmin = userData?.role === 'admin';
            if (isAdmin) {
                document.getElementById('admin-controls').style.display = 'block';
            }
            loadUpdates();
        } else {
            document.getElementById('admin-controls').style.display = 'none';
            loadUpdates();
        }
    });
</script>
</body>
</html>
